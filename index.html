    .step-list li::before { content: counter(step); position: absolute; left: 0; top: 0; width: 22px; height: 22px; border-radius: 50%; background: var(--primary-600); color: #fff; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }

<body>
  <div id="app"></div>

  <div id="app-update-banner" class="app-update-banner hidden" role="status" aria-live="polite">
    <p>有新版 App 可用，更新後會保留本機資料。</p>
    <button type="button" class="btn btn-primary btn-sm" id="app-update-btn">更新</button>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="./app-version.js"></script>
  <script src="./guideline-quality.js"></script>
  <script src="./case-state.js"></script>
  <script src="./backup-format.js"></script>
  <script src="./clinical-templates.js"></script>
  <script src="./clinical-matcher.js"></script>
  <script src="./clinical-scenarios.js"></script>
  <script src="./nhi-parser.js"></script>
  <script src="./nhi-versioning.js"></script>
  <script src="./nhi-selector.js"></script>
  <script src="./nccn-parser.js"></script>
  <script type="module">
    // ========== Database ==========
    const DB_NAME = 'OncologyGuidelineDB';
    const DB_VERSION = 2;
    const APP_VERSION = window.ONCOLOGY_APP_VERSION || 'unknown';
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('cancerCards')) {
            const store = db.createObjectStore('cancerCards', { keyPath: 'id' });
            store.createIndex('category', 'category');
            store.createIndex('zhName', 'zhName');
          }
          if (!db.objectStoreNames.contains('documents')) {
            const store = db.createObjectStore('documents', { keyPath: 'id' });
            store.createIndex('cancerIds', 'cancerIds', { multiEntry: true });
          }
          if (!db.objectStoreNames.contains('checklists')) {
            const store = db.createObjectStore('checklists', { keyPath: 'id' });
            store.createIndex('cancerId', 'cancerId');
          }
          if (!db.objectStoreNames.contains('precisionFields')) {
            const store = db.createObjectStore('precisionFields', { keyPath: 'id' });
            store.createIndex('cancerId', 'cancerId');
          }
          if (!db.objectStoreNames.contains('nhiNotes')) {
            const store = db.createObjectStore('nhiNotes', { keyPath: 'id' });
            store.createIndex('cancerId', 'cancerId');
          }
          if (!db.objectStoreNames.contains('restoreSnapshots')) {
            db.createObjectStore('restoreSnapshots', { keyPath: 'id' });
          }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(db); };
        req.onerror = (e) => reject(e.target.error);
      });
    }

    // PDF storage (separate DB for large files)
    function openPdfDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('OncologyPdfStorage', 1);
        req.onupgradeneeded = (e) => {
          e.target.result.createObjectStore('pdfs');
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e.target.error);
      });
    }

    function dbGetAll(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbGet(storeName, id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).get(id);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbPut(storeName, data) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).put(data);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbPutMany(storeName, items) {
      if (!items.length) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        for (const item of items) store.put(item);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error('批次寫入已中止'));
      });
    }

    function dbDelete(storeName, id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).delete(id);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    function dbClear(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).clear();
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    function dbReplaceStores(data) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(BACKUP_STORES, 'readwrite');
        for (const storeName of BACKUP_STORES) {
          const store = tx.objectStore(storeName);
          store.clear();
          for (const item of data[storeName] || []) store.put(item);
        }
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error('資料還原交易已中止'));
      });
    }

    // ========== Seed Data ==========
    const CATEGORIES = {
      '消化系癌症': [
        { zh: '食道癌', en: 'Esophageal cancer', syn: ['esophageal carcinoma','食道鱗狀細胞癌','食道腺癌'] },
        { zh: '胃癌', en: 'Gastric cancer', syn: ['stomach cancer','gastric carcinoma'] },
        { zh: '小腸癌', en: 'Small bowel cancer', syn: ['small intestinal cancer','duodenal cancer'] },
        { zh: '大腸直腸癌', en: 'Colorectal cancer', syn: ['CRC','colon cancer','rectal cancer','結腸癌','直腸癌'] },

    async function seedDatabase() {
      const cardsById = new Map((await dbGetAll('cancerCards')).map(card => [card.id, card]));
      const today = new Date().toISOString().split('T')[0];
      for (const [category, cancers] of Object.entries(CATEGORIES)) {
        for (const c of cancers) {
          const id = c.id || ID_MAP[c.zh];
          if (cardsById.has(id)) continue;
          await dbPut('cancerCards', {
            id,
            category,
            zhName: c.zh,
            enName: c.en,
            synonyms: c.syn,
            primaryGuideline: '',
            secondaryGuidelines: [],
            documentIds: [],
            mustReadSections: [],
            checklistIds: [],
            precisionFieldIds: [],
            nhiNoteIds: [],
            externalLinks: [],
            reviewStatus: '待維護',
            updatedAt: today,
          });
          cardsById.set(id, await dbGet('cancerCards', id));
        }
      }

      for (const guideline of NCCN_GUIDELINES) {
        for (const cardId of guideline.cardIds) {
          const card = cardsById.get(cardId);
          if (!card) throw new Error('NCCN card template not found: ' + cardId);
          const currentLinks = card.nccnGuidelines || [];
          if (currentLinks.some(item => item.id === guideline.id)) continue;
          const updatedCard = {
            ...card,
            nccnGuidelines: [...currentLinks, { id: guideline.id, title: guideline.title, url: guideline.url }],
          };
          await dbPut('cancerCards', updatedCard);
          cardsById.set(card.id, updatedCard);
        }
      }
      await syncNccnDocumentCoverage(cardsById);

      // Keep compatibility-sensitive option values stable while refreshing explanatory UI metadata.
      const clinicalPrecisionMetadata = [];
      for (const item of await dbGetAll('precisionFields')) {
        const idPrefix = 'clinical-pf:' + item.cancerId + ':';
        const builtInId = String(item.id || '').startsWith(idPrefix);
        if (item.sourceType !== '內建癌別範本' && !builtInId) continue;
        const templateKey = item.sourceTemplateKey || (builtInId ? String(item.id).slice(idPrefix.length) : '');
        const template = precisionTemplatesForCancer(item.cancerId).find(candidate => candidate.key === templateKey);
        if (!template || (!template.help && !template.optionLabels)) continue;
        const nextHelp = template.help || '';
        const nextOptionLabels = { ...(template.optionLabels || {}) };
        const metadataMatches = item.sourceType === '內建癌別範本' && item.sourceTemplateKey === templateKey &&
          item.help === nextHelp && JSON.stringify(item.optionLabels || {}) === JSON.stringify(nextOptionLabels);
        if (metadataMatches) continue;
        clinicalPrecisionMetadata.push({
          ...item,
          sourceType: '內建癌別範本',
          sourceTemplateKey: templateKey,
          help: nextHelp,
          optionLabels: nextOptionLabels,
        });
      }
      await dbPutMany('precisionFields', clinicalPrecisionMetadata);

      const normalizeClinicalLabel = (value) => String(value || '').trim().toLocaleLowerCase().replace(/\s+/g, ' ');
      const checklistByCancer = new Map();
      const precisionByCancer = new Map();
      for (const item of await dbGetAll('checklists')) {
        if (!checklistByCancer.has(item.cancerId)) checklistByCancer.set(item.cancerId, []);
        checklistByCancer.get(item.cancerId).push(item);
      }
      for (const item of await dbGetAll('precisionFields')) {
        if (!precisionByCancer.has(item.cancerId)) precisionByCancer.set(item.cancerId, []);
        precisionByCancer.get(item.cancerId).push(item);
      }

      const pendingClinicalChecklists = [];
      const pendingClinicalPrecision = [];
      const pendingClinicalCards = [];

      for (const [cancerId, card] of cardsById) {
        if (Number(card.clinicalTemplateVersion || 0) >= CLINICAL_TEMPLATE_VERSION) continue;
        const offeredKeys = new Set(card.clinicalTemplateKeys || []);
        const checklistLabels = new Set((checklistByCancer.get(cancerId) || []).map(item => normalizeClinicalLabel(item.label)));
        const precisionLabels = new Set((precisionByCancer.get(cancerId) || []).map(item => normalizeClinicalLabel(item.label)));

        for (const template of checklistTemplatesForCancer(cancerId)) {
          const offeredKey = 'checklist:' + template.key;
          if (offeredKeys.has(offeredKey)) continue;
          const knownLabels = [template.label, ...(template.aliases || [])].map(normalizeClinicalLabel);
          if (!knownLabels.some(label => checklistLabels.has(label))) {
            pendingClinicalChecklists.push({
              id: 'clinical-cl:' + cancerId + ':' + template.key,
              cancerId,
              label: template.label,
              category: template.category,
              importance: template.importance,
              condition: null,
              checked: false,
              sourceType: '內建癌別範本',
              sourceDocumentId: '',
              sourceTemplateKey: template.key,
              templateScope: template.scope,
              updatedAt: today,
            });
            checklistLabels.add(normalizeClinicalLabel(template.label));
          }
          offeredKeys.add(offeredKey);
        }

        for (const template of precisionTemplatesForCancer(cancerId)) {
          const offeredKey = 'precision:' + template.key;
          if (offeredKeys.has(offeredKey)) continue;
          const knownLabels = [template.label, ...(template.aliases || [])].map(normalizeClinicalLabel);
          if (!knownLabels.some(label => precisionLabels.has(label))) {
            pendingClinicalPrecision.push({
              id: 'clinical-pf:' + cancerId + ':' + template.key,
              cancerId,
              label: template.label,
              type: template.type,
              required: false,
              options: [...template.options],
              help: template.help || '',
              optionLabels: { ...(template.optionLabels || {}) },
              sourceType: '內建癌別範本',
              sourceTemplateKey: template.key,
              templateScope: template.scope,
            });
            precisionLabels.add(normalizeClinicalLabel(template.label));
          }
          offeredKeys.add(offeredKey);
        }

        const updatedCard = {
          ...card,
          clinicalTemplateVersion: CLINICAL_TEMPLATE_VERSION,
          clinicalTemplateKeys: [...offeredKeys],
          clinicalTemplateSeededAt: today,
        };
        pendingClinicalCards.push(updatedCard);
        cardsById.set(cancerId, updatedCard);
      }

      await Promise.all([
        dbPutMany('checklists', pendingClinicalChecklists),
        dbPutMany('precisionFields', pendingClinicalPrecision),
        dbPutMany('cancerCards', pendingClinicalCards),
      ]);
    }

    // ========== PDF Helpers ==========
    function pdfStorageError(error) {
      const name = error?.name || '';
      if (name === 'QuotaExceededError') return new Error('瀏覽器儲存空間不足');
      return new Error('無法儲存 PDF' + (name ? `（${name}）` : ''));
    }

    async function validatePdfFile(file) {
      if (!file?.size) throw new Error('檔案大小為 0；雲端檔案可能尚未下載到裝置');
      let header;
      try {
        const bytes = new Uint8Array(await file.slice(0, 1024).arrayBuffer());
        header = String.fromCharCode(...bytes);
      } catch {
        throw new Error('無法讀取雲端檔案；請先下載到裝置後再重試');
      }
      if (!header.includes('%PDF-')) throw new Error('檔案內容不是有效的 PDF');
    }

    async function storePdf(file) {
      await validatePdfFile(file);
      const pdfDb = await openPdfDB();
      const key = 'pdf-' + crypto.randomUUID();
      const pdfBlob = file.type === 'application/pdf' ? file : new Blob([file], { type: 'application/pdf' });
      return new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readwrite');
        let settled = false;
        const finish = (callback) => {
          if (settled) return;
          settled = true;
          pdfDb.close();
          callback();
        };
        tx.oncomplete = () => finish(() => resolve(key));
        const fail = () => finish(() => reject(pdfStorageError(tx.error)));
        tx.onerror = fail;
        tx.onabort = fail;
        try {
          tx.objectStore('pdfs').put(pdfBlob, key);
        } catch (error) {
          finish(() => reject(pdfStorageError(error)));
        }
      });
    }

    async function getPdfBlob(key) {
      const pdfDb = await openPdfDB();
      return new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readonly');
        const req = tx.objectStore('pdfs').get(key);
        req.onsuccess = () => {
          pdfDb.close();
          const stored = req.result;
          if (stored == null) { resolve(null); return; }
          resolve(stored instanceof Blob && stored.type === 'application/pdf'
            ? stored
            : new Blob([stored], { type: 'application/pdf' }));
        };
        req.onerror = () => { pdfDb.close(); reject(new Error('無法讀取 PDF')); };
      });
    }

    async function deletePdf(key) {
      const pdfDb = await openPdfDB();
      return new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').delete(key);
        tx.oncomplete = () => { pdfDb.close(); resolve(); };
        tx.onerror = () => { pdfDb.close(); reject(new Error('無法刪除 PDF')); };
      });
    }


    function putPdfBuffer(key, buf) {
      return openPdfDB().then(pdfDb => new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').put(buf, key);
        tx.oncomplete = () => { pdfDb.close(); resolve(); };
        tx.onerror = () => { pdfDb.close(); reject(new Error('無法儲存 PDF')); };
      }));
    }

    function bufferToDataUrl(buf) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('PDF 轉換失敗'));
        reader.readAsDataURL(new Blob([buf], { type: 'application/pdf' }));
      });
    }

    // ========== Backup ==========
    const BACKUP_STORES = ['cancerCards','documents','checklists','precisionFields','nhiNotes'];
    const BACKUP_PLAN_KEY = 'oncology-backup-plan';
    const PDF_RESTORE_TRACKER_KEY = 'oncology-pdf-restore-progress';

    async function collectMetadataStores() {
      const [cancerCards, documents, checklists, precisionFields, nhiNotes] = await Promise.all([
        dbGetAll('cancerCards'), dbGetAll('documents'), dbGetAll('checklists'),
        dbGetAll('precisionFields'), dbGetAll('nhiNotes')
      ]);
      return {
        cancerCards,
        documents,
        checklists,
        precisionFields: window.CASE_STATE.stripValues(precisionFields),
        nhiNotes,
      };
    }

    function backupPlanForDocuments(documents) {
      const signature = (documents || []).map(doc => doc.storageKey).filter(Boolean).sort().join('|');
      try {
        const existing = JSON.parse(sessionStorage.getItem(BACKUP_PLAN_KEY) || 'null');
        if (existing?.signature === signature && Date.now() - new Date(existing.exportedAt).getTime() < 86400000) return existing;
      } catch {}
      const plan = {
        backupSetId: crypto.randomUUID?.() || ('backup-' + Date.now()),
        exportedAt: new Date().toISOString(),
        signature,
      };
      try { sessionStorage.setItem(BACKUP_PLAN_KEY, JSON.stringify(plan)); } catch {}
      return plan;
    }

    async function sha256Hex(buffer) {
      if (!crypto.subtle?.digest) throw new Error('此瀏覽器不支援 SHA-256 完整性檢查');
      const digest = new Uint8Array(await crypto.subtle.digest('SHA-256', buffer));
      return [...digest].map(byte => byte.toString(16).padStart(2, '0')).join('');
    }

    async function metadataWithIntegrity(payload) {
      const digest = await sha256Hex(new TextEncoder().encode(JSON.stringify(payload)));
      return { ...payload, integrity: { algorithm: 'SHA-256', digest } };
    }

    async function verifyMetadataIntegrity(data) {
      if (data.version !== BACKUP_FORMAT.version) return;
      if (data.integrity?.algorithm !== 'SHA-256' || !data.integrity.digest) throw new Error('備份缺少 SHA-256 完整性資料');
      const clone = { ...data };
      delete clone.integrity;
      const digest = await sha256Hex(new TextEncoder().encode(JSON.stringify(clone)));
      if (digest !== data.integrity.digest) throw new Error('備份校驗失敗，檔案可能不完整或已被修改');
    }

    async function exportBackup() {
      const stores = await collectMetadataStores();
      const plan = backupPlanForDocuments(stores.documents);
      const payload = BACKUP_FORMAT.metadataPayload(stores, plan.exportedAt, { backupSetId: plan.backupSetId });
      return metadataWithIntegrity(payload);
    }

    async function exportPdfBackupBatch(documents, batchIndex, batchCount, plan) {
      const pdfs = [];
      for (const document of documents) {
        const blob = await getPdfBlob(document.storageKey);
        if (!blob) continue;
        const buffer = await blob.arrayBuffer();
        pdfs.push({
          key: document.storageKey,
          documentId: document.id,
          title: document.title,
          byteLength: buffer.byteLength,
          sha256: await sha256Hex(buffer),
          data: await bufferToDataUrl(buffer),
        });
      }
      return BACKUP_FORMAT.pdfBatchPayload(pdfs, batchIndex, batchCount, plan.exportedAt, { backupSetId: plan.backupSetId });
    }

    function downloadJSON(data, filename, compact = false) {
      const blob = new Blob([JSON.stringify(data, null, compact ? 0 : 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function validateBackupStores(data) {
      for (const store of BACKUP_STORES) {
        const items = data[store] || [];
        if (!Array.isArray(items)) throw new Error('備份格式錯誤：' + store);
        for (const item of items) {
          if (!item || typeof item.id !== 'string' || !item.id) throw new Error('備份格式錯誤：' + store + ' 缺少 id');
        }
      }
    }

    async function decodePdfItems(pdfs, requireIntegrity = false) {
      const output = [];
      for (const pdf of pdfs || []) {
        if (!pdf?.key || typeof pdf.data !== 'string') throw new Error('PDF 批次格式錯誤');
        const buf = await (await fetch(pdf.data)).arrayBuffer();
        if (requireIntegrity) {
          if (!pdf.sha256 || !Number.isFinite(Number(pdf.byteLength))) throw new Error('PDF 缺少校驗資料：' + (pdf.title || pdf.key));
          if (Number(pdf.byteLength) !== buf.byteLength) throw new Error('PDF 大小不符：' + (pdf.title || pdf.key));
          if (await sha256Hex(buf) !== pdf.sha256) throw new Error('PDF SHA-256 校驗失敗：' + (pdf.title || pdf.key));
        }
        output.push({ key: pdf.key, buf });
      }
      return output;
    }

    async function saveRestoreSnapshot(stores, label = '匯入前自動保留') {
      const snapshot = {
        id: crypto.randomUUID?.() || ('snapshot-' + Date.now()),
        createdAt: new Date().toISOString(),
        label,
        data: stores,
      };
      await dbPut('restoreSnapshots', snapshot);
      const snapshots = (await dbGetAll('restoreSnapshots')).sort((a, b) => b.createdAt.localeCompare(a.createdAt));
      for (const old of snapshots.slice(3)) await dbDelete('restoreSnapshots', old.id);
      return snapshot;
    }

    function readPdfRestoreTracker() {
      try {
        const value = JSON.parse(localStorage.getItem(PDF_RESTORE_TRACKER_KEY) || 'null');
        return value && typeof value === 'object' ? value : null;
      } catch {
        return null;
      }
    }

    function writePdfRestoreTracker(value) {
      localStorage.setItem(PDF_RESTORE_TRACKER_KEY, JSON.stringify(value));
    }

    async function importBackup(file) {
      const data = JSON.parse(await file.text());
      const kind = BACKUP_FORMAT.kind(data);
      if (!['metadata', 'metadata-v3', 'legacy-metadata', 'legacy-full'].includes(kind)) {
        if (['pdf-batch', 'pdf-batch-v3'].includes(kind)) throw new Error('這是 PDF 批次，請使用「匯入 PDF 批次」');
        throw new Error('備份格式不相容');
      }
      validateBackupStores(data);
      await verifyMetadataIntegrity(data);
      const pdfBuffers = kind === 'legacy-full' ? await decodePdfItems(data.pdfs) : [];
      const currentStores = await collectMetadataStores();
      const snapshot = await saveRestoreSnapshot(currentStores);
      const importedFields = data.precisionFields || [];
      const stores = Object.fromEntries(BACKUP_STORES.map(store => [store, data[store] || []]));
      stores.precisionFields = window.CASE_STATE.stripValues(importedFields);
      for (const pdf of pdfBuffers) await putPdfBuffer(pdf.key, pdf.buf);
      await dbReplaceStores(stores);
      window.CASE_STATE.clearAll();
      const migration = window.CASE_STATE.migrateLegacy(importedFields);
      if (data.version === BACKUP_FORMAT.version && data.manifest?.pdfBatchCount > 0) {
        writePdfRestoreTracker({
          backupSetId: data.backupSetId,
          batchCount: data.manifest.pdfBatchCount,
          expectedPdfCount: data.manifest.pdfCount || 0,
          restored: [],
        });
      } else {
        localStorage.removeItem(PDF_RESTORE_TRACKER_KEY);
      }
      return { kind, snapshotId: snapshot.id, migratedCaseValues: migration.migratedCount };
    }

    async function importPdfBackupBatch(file) {
      const data = JSON.parse(await file.text());
      const kind = BACKUP_FORMAT.kind(data);
      if (!['pdf-batch', 'pdf-batch-v3'].includes(kind)) throw new Error('不是可用的 PDF 批次備份');
      const requireIntegrity = kind === 'pdf-batch';
      if (requireIntegrity && !data.backupSetId) throw new Error('PDF 批次缺少備份識別碼');
      const batchIndex = Number(data.batchIndex);
      const batchCount = Number(data.batchCount);
      if (!Number.isInteger(batchIndex) || !Number.isInteger(batchCount) || batchIndex < 1 || batchIndex > batchCount) {
        throw new Error('PDF 批次編號不正確');
      }
      const pdfBuffers = await decodePdfItems(data.pdfs, requireIntegrity);
      if (!pdfBuffers.length) throw new Error('批次內沒有可還原的 PDF');
      const backupSetId = data.backupSetId || ('legacy-v3:' + (data.exportedAt || 'unknown'));
      let tracker = readPdfRestoreTracker();
      if (!tracker || tracker.backupSetId !== backupSetId) {
        tracker = { backupSetId, batchCount, expectedPdfCount: null, restored: [] };
      }
      if (Number(tracker.batchCount) !== batchCount) throw new Error('PDF 批次總數與目前還原工作不一致');
      for (const pdf of pdfBuffers) await putPdfBuffer(pdf.key, pdf.buf);
      tracker.restored = [...new Set([...(tracker.restored || []), batchIndex])].sort((a, b) => a - b);
      writePdfRestoreTracker(tracker);
      return { restoredPdfCount: pdfBuffers.length, backupSetId, progress: BACKUP_FORMAT.batchProgress(batchCount, tracker.restored) };
    }


    // ========== Search ==========
    function searchCards(cards, query) {
      if (!query.trim()) return cards;
      const q = query.toLowerCase().trim();
      return cards.filter(c =>
        c.zhName.toLowerCase().includes(q) ||
        c.enName.toLowerCase().includes(q) ||
        c.id.toLowerCase().includes(q) ||
        c.synonyms.some(s => s.toLowerCase().includes(q)) ||
        c.category.toLowerCase().includes(q) ||
        (c.nccnGuidelines || []).some(g => g.title.toLowerCase().includes(q))
      );
    }

    // ========== Filename Guessing (batch import) ==========
    const SOURCE_PATTERNS = [
      ['NCCN', /nccn/i], ['ESMO', /esmo/i], ['ASCO', /asco/i], ['NICE', /nice/i],
      ['JSCO', /jsco/i], ['TCOG', /tcog/i], ['AJCC', /ajcc/i], ['WHO', /\bwho\b/i],
      ['健保', /健保|nhi|dl-\d+-[a-f0-9-]{16,}/i],
    ];
    // 常見指引檔名縮寫 → 癌別 id（synonyms 沒涵蓋的）
    const FILENAME_HINTS = { nscl: 'nsclc' };
    const NAME_STOPWORDS = new Set(['cancer','cancers','carcinoma','tumor','tumors','tumour','cell','cells','of','and','the','disease','neoplasm','neoplasms','syndrome','syndromes']);

    function guessSource(name) {
      for (const [label, re] of SOURCE_PATTERNS) if (re.test(name)) return label;
      return '';
    }

    function guessVersion(name) {
      let m = name.match(/(20\d{2})[ ._-]*[vV](\d+)/);
      if (m) return m[1] + '.V' + m[2];
      m = name.match(/[vV](\d+)[ ._-]*(20\d{2})/);
      if (m) return m[2] + '.V' + m[1];
      m = name.match(/20\d{2}/);
      return m ? m[0] : '';
    }

    function normalizeNccnTitle(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/\.pdf$/i, '')
        .replace(/\bnccn\b|\bguidelines?\b|\bversion\b|\b20\d{2}\b|\bv\d+\b/g, ' ')
        .replace(/[^a-z0-9]+/g, ' ')
        .trim()
        .replace(/\s+/g, ' ');
    }

    function findNccnGuideline(value) {
      const normalized = normalizeNccnTitle(value);
      if (!normalized) return null;
      return NCCN_GUIDELINES
        .flatMap(guideline => [guideline.title, ...guideline.titleAliases]
          .map(title => ({ guideline, title: normalizeNccnTitle(title) })))
        .filter(item => item.title && (` ${normalized} `).includes(` ${item.title} `))
        .sort((a, b) => b.title.length - a.title.length)[0]?.guideline || null;
    }

    function nccnGuidelineForDocument(doc) {
      const stored = NCCN_GUIDELINES.find(guideline => guideline.id === doc.nccnGuidelineId);
      if (stored) return stored;
      const text = [doc.fileName, doc.title].filter(Boolean).join(' ');
      const matched = findNccnGuideline(text);
      const looksNccn = /nccn/i.test([doc.source, text].filter(Boolean).join(' '));
      const exactTitleMatch = matched && normalizeNccnTitle(doc.title) === normalizeNccnTitle(matched.title);
      const linkedToMatchedCard = matched && matched.cardIds.some(cardId => doc.cancerIds?.includes(cardId));
      if (matched && (looksNccn || exactTitleMatch || linkedToMatchedCard)) return matched;
      if (!looksNccn) return null;
      const linked = NCCN_GUIDELINES.filter(g => doc.cancerIds?.includes(g.cardId));
      return linked.length === 1 ? linked[0] : null;
    }

    async function syncNccnDocumentCoverage(cardsById) {
      const today = new Date().toISOString().split('T')[0];
      for (const doc of await dbGetAll('documents')) {
        const guideline = nccnGuidelineForDocument(doc);
        if (!guideline) continue;
        const cancerIds = [...new Set([...(doc.cancerIds || []), ...guideline.cardIds])];
        if (cancerIds.length !== (doc.cancerIds || []).length || doc.nccnGuidelineId !== guideline.id) {
          await dbPut('documents', { ...doc, cancerIds, nccnGuidelineId: guideline.id });
        }
        for (const cardId of guideline.cardIds) {
          const card = cardsById.get(cardId);
          if (!card || card.documentIds.includes(doc.id)) continue;
          const updatedCard = { ...card, documentIds: [...card.documentIds, doc.id], updatedAt: today };
          await dbPut('cancerCards', updatedCard);
          cardsById.set(cardId, updatedCard);
        }
      }
    }

    function guessCancer(filename, cards) {
      const nccnGuideline = findNccnGuideline(filename);
      if (nccnGuideline) return cards.find(card => card.id === nccnGuideline.cardId) || null;
      const norm = filename.toLowerCase().replace(/\.pdf$/i, '').replace(/[_\-.+()\[\]]+/g, ' ');
      const tokens = new Set(norm.split(/\s+/).filter(Boolean));
      for (const [hint, id] of Object.entries(FILENAME_HINTS)) {
        if (tokens.has(hint)) { const c = cards.find(c => c.id === id); if (c) return c; }
      }
      let best = null, bestScore = 0;
      for (const c of cards) {
        let score = 0;
        if (c.zhName && filename.includes(c.zhName)) score = 5 + Math.min(c.zhName.length, 80) / 1000;
        for (const n of [c.enName, ...(c.synonyms || []), ...(c.nccnGuidelines || []).map(g => g.title)]) {
          if (!n) continue;
          if (/[一-鿿]/.test(n)) {
            if (filename.includes(n)) score = Math.max(score, 5 + Math.min(n.length, 80) / 1000);
            continue;
          }
          const ln = n.toLowerCase();
          const specificityBonus = Math.min(ln.length, 80) / 1000;
          if (!ln.includes(' ') && /^[a-z0-9]{2,6}$/.test(ln)) {
            // 縮寫要求整個 token 完全一致，避免 mm/hl 之類誤中
            if (tokens.has(ln)) score = Math.max(score, ln.length >= 3 ? 3 : 2);
          } else if (norm.includes(ln)) {
            score = Math.max(score, 4 + specificityBonus);
          } else {
            const words = ln.split(/\s+/).filter(w => !NAME_STOPWORDS.has(w));
            if (words.length && words.every(w => tokens.has(w))) score = Math.max(score, 4 + specificityBonus);
          }
        }
        if (score > bestScore) { bestScore = score; best = c; }
      }
      return bestScore >= 2 ? best : null;
    }

    // ========== HTML Escape ==========
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => (
        { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
      ));
    }

    // Hash-based：GitHub Pages 專案子路徑沒有 SPA fallback，
    // history.pushState 的路徑重新整理會 404
    let currentRoute = '/';
    let routeParams = {};

    function getHashPath() {
      const h = window.location.hash;
      return h.length > 1 ? h.slice(1) : '/';
    }

    function parseRoute(path) {
      currentRoute = path || '/';
      routeParams = {};
      const parts = currentRoute.split('/').filter(Boolean);
      if (parts[0] === 'cancer' && parts[1]) {
        routeParams.cancerId = parts[1];
        routeParams.sub = parts[2] || '';
      } else if (parts[0] === 'pdf-library' && parts[1] === 'import') {
        routeParams.docId = parts[2] || '';
      }
    }

    async function handleRoute(options = {}) {
      const preserveScroll = options?.preserveScroll === true;
      const previousScrollY = document.scrollingElement?.scrollTop ?? window.scrollY;
      const anchorId = options?.anchorId || '';
      const measuredAnchorTop = document.getElementById(anchorId)?.getBoundingClientRect().top;
      const anchorTop = Number.isFinite(options?.anchorTop) ? options.anchorTop : measuredAnchorTop;
      parseRoute(getHashPath());
      await render();
      const restoreScroll = () => {
        if (!preserveScroll) { window.scrollTo(0, 0); return; }
        const anchor = anchorId ? document.getElementById(anchorId) : null;
        if (anchor && Number.isFinite(anchorTop)) {
          window.scrollBy(0, anchor.getBoundingClientRect().top - anchorTop);
        } else {
          window.scrollTo(0, previousScrollY);
        }
      };
      restoreScroll();
      setTimeout(restoreScroll, 80);
    }

    function navigate(path) {
      if (getHashPath() === path) { handleRoute(); return; }
      window.location.hash = path;
    }

      } else if (routeParams.sub === 'precision') {

      } else if (routeParams.sub === 'nhi') {
        await renderNhi(app);
      } else if (currentRoute === '/sources') {
        await renderSourceHub(app);
      } else if (currentRoute === '/pdf-library' && !routeParams.docId) {
        await renderPdfLibrary(app);
      } else if (currentRoute === '/pdf-library/batch') {
        await renderBatchImport(app);
      } else if (currentRoute.startsWith('/pdf-library/import')) {
        await renderImportPdf(app);
      } else if (currentRoute === '/settings') {
        await renderSettings(app);
      } else {
        navigate('/');
      }
    }

      const queryPrecisionFields = applyNhiQueryState(precisionFields, queryState);

      const unfilledPf = queryPrecisionFields.filter(field => !hasPfValue(field));

      const nccnDiagnosis = nccnTreatmentDiagnosis(parsedNccnDocs, queryPrecisionFields);

      const nccnDiagnosisFeatureLabels = nccnDiagnosis.positiveFeatures.map(item => window.CLINICAL_MATCHER.featureLabel(item.key));
      const nccnDiagnosisUnmatchedLabels = nccnDiagnosis.unmatchedFeatures.map(item => window.CLINICAL_MATCHER.featureLabel(item.key));
      const nccnConflicts = nccnClinicalConflicts(card.id, queryPrecisionFields);

      const clHidden = clAll.length - clVisible.length;

      const nhiVisible = nhiAll.sort((a, b) => nhiConditionRank(a.st) - nhiConditionRank(b.st));

      const selectedUnmatchedLabels = [...new Set(selectedUnmatchedEntries.map(({ n }) => n.condition?.field).filter(Boolean))];
      const affectedNhiConditionLabels = [...new Set([...selectedUnknownLabels, ...selectedUnmatchedLabels])];

                  <p class="font-semibold">目前有條件未符合</p>
                  <p class="text-xs mt-1">${esc(selectedUnmatchedLabels.join('、'))}</p>
                  ${affectedNhiFields.length ? '<button type="button" class="btn btn-secondary btn-sm mt-3" id="nhi-query-open-btn">修改條件</button>' : ''}

                ${selectedNhiResultState === 'matched' ? `<div class="nhi-query-status is-matched" aria-live="polite"><p class="font-semibold">${selectedNhiMatchLevel === 'component' ? '部分成分目前符合已擷取條件' : '目前輸入資料符合已擷取條件'}</p><p class="text-xs mt-1">${selectedNhiMatchLevel === 'component' ? '僅代表部分成分有相關規定；整套療程仍須逐項確認。' : '仍需核對完整條文、文件證明與事前審查要求。'}</p></div>` : ''}
                ${selectedNhiResultState === 'similar' ? `<div class="nhi-query-status is-warning" aria-live="polite"><p class="font-semibold">只有名稱相似，不能判定健保給付</p><p class="text-xs mt-1">請開啟原始健保條文，確認是否為相同成分、複方與適應症。</p></div>` : ''}
                ${selectedNhiResultState === 'review' && selectedTreatment.entries.length ? `<div class="nhi-query-status" aria-live="polite"><p class="font-semibold">需逐項人工核對限制條件</p></div>` : ''}
                ${affectedNhiFields.length ? `<div id="nhi-query-panel" class="nhi-query-panel hidden">

                  ${affectedNhiFields.map(renderNhiQueryField).join('')}
                  <div class="nhi-query-toolbar">
                    <button type="button" class="btn btn-primary flex-1" id="nhi-query-submit-btn">重新比對</button>
                    <button type="button" class="btn btn-secondary flex-1" id="nhi-query-cancel-btn">取消</button>
                  </div>
                </div>` : ''}
                ${missingNhiFieldLabels.length ? `<div class="nhi-query-status is-warning"><p class="font-semibold">尚未建立對應欄位</p><p class="text-xs mt-1">${esc(missingNhiFieldLabels.join('、'))}</p><button type="button" class="btn btn-secondary btn-sm mt-3" id="nhi-query-edit-fields-btn">編輯精準欄位</button></div>` : ''}
                <div class="space-y-2">${selectedTreatment.entries.map(({ n, st, nhiMatchLevel }, index) => {
                  const linked = docs.find(d => d.id === n.sourceDocumentId);
                  const evidence = nhiMatchLevelLabels[nhiMatchLevel] || '待核對';
                  const heading = selectedTreatment.entries.length > 1 ? `給付條件 ${index + 1} · ${n.label} · ${evidence}` : `${selectedTreatment.label} · ${evidence}`;
                  return renderNhiNoteCard(n, st, linked, heading);
                }).join('')}</div>
              ` : '<div class="bg-gray-50 rounded p-3"><p class="text-sm text-gray-500">尚未選擇藥物／療程</p></div>'}
            ` : `<div class="bg-gray-50 rounded p-3"><p class="text-sm text-gray-500">尚未建立藥物／療程健保資料；這不代表沒有給付。</p><button class="btn btn-secondary btn-sm mt-3" onclick="navigate('/cancer/${card.id}/nhi')">新增藥物／療程</button></div>`}

              <div class="space-y-2 mt-2">${generalNhiEntries.map(({ n, st }) => {

              }).join('')}</div>

          ${missingItems.length ? `
            <div class="card section" style="border-color:var(--orange-200);background:var(--orange-50)">
              <h2 class="section-title" style="color:var(--orange-700)">⚠️ 目前資訊不足</h2>
              <ul class="space-y-1">${missingItems.map(m => `<li class="text-sm" style="color:var(--orange-700)">• ${m}</li>`).join('')}</ul>
            </div>
          ` : ''}

          <div class="card section" style="border-color:var(--primary-200);background:var(--primary-50)">
            <h2 class="section-title" style="color:var(--primary-800)">👉 下一步</h2>
            <ul class="space-y-2">
              ${hasDocs ? '<li class="text-sm" style="color:var(--primary-700)">✅ 已有本機指引，可直接開啟查閱</li>' : '<li class="text-sm" style="color:var(--primary-700)">• 先匯入本機 PDF 指引</li>'}
              ${card.mustReadSections.length ? '<li class="text-sm" style="color:var(--primary-700)">• 依必查章節逐項確認</li>' : ''}
              ${unfilledPf.length ? `<li class="text-sm" style="color:var(--primary-700)">• 若要更精準，回癌別頁補充：${esc(unfilledPf.map(f => f.label).join('、'))}</li>` : ''}
              ${checklists.length ? '<li class="text-sm" style="color:var(--primary-700)">• 依不要漏 checklist 逐項確認</li>' : ''}
            </ul>
          </div>

          <button class="btn btn-secondary" id="copy-quickref-btn">📋 複製為文字</button>

          <div class="text-xs text-gray-400 text-center mt-4 mb-8">
            <p>來源：${esc(effectivePrimaryGuideline || '尚未設定')}</p>
            <p>更新日期：${esc(card.updatedAt)}</p>
            <p class="mt-2">此為快速參考，非最終治療建議</p>
          </div>
          ${renderNav('')}
        </div>
      `;

      app.querySelectorAll('[data-nhi-treatment-key]').forEach((button) => {
        button.addEventListener('click', () => {
          const key = nhiTreatmentSessionKey(card.id);
          const treatmentKey = button.dataset.nhiTreatmentKey;
          if (sessionStorage.getItem(key) === treatmentKey) sessionStorage.removeItem(key);
          else sessionStorage.setItem(key, treatmentKey);
          handleRoute({ preserveScroll: true });
        });
      });

      document.getElementById('nccn-diagnostic-submit-btn')?.addEventListener('click', () => {
        const panel = document.getElementById('nccn-diagnostic-panel');
        if (!panel) return;
        const controls = [...panel.querySelectorAll('[data-nhi-query-field]')];
        const currentState = readNhiQueryState(card.id);
        const values = { ...currentState.values };
        nccnDiagnosticFields.forEach((field) => {
          const fieldControls = controls.filter(control => control.dataset.nhiQueryField === field.id);
          values[field.id] = field.type === 'multi_select'
            ? fieldControls.filter(control => control.checked).map(control => control.value)
            : (fieldControls[0]?.value || '').trim();
        });
        writeNhiQueryState(card.id, { fresh: currentState.fresh, values });
        showToast('已更新條件並重新查詢療程');
        handleRoute({ preserveScroll: true });
      });

      document.getElementById('nhi-query-open-btn')?.addEventListener('click', () => {
        const panel = document.getElementById('nhi-query-panel');
        panel?.classList.remove('hidden');
        panel?.querySelector('[data-nhi-query-field]')?.focus();
        panel?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });
      document.getElementById('nhi-query-cancel-btn')?.addEventListener('click', () => {
        document.getElementById('nhi-query-panel')?.classList.add('hidden');
      });
      document.getElementById('nhi-query-edit-fields-btn')?.addEventListener('click', () => {
        navigate('/cancer/' + card.id + '/precision');
      });
      document.getElementById('nhi-query-submit-btn')?.addEventListener('click', () => {
        const panel = document.getElementById('nhi-query-panel');
        if (!panel) return;
        const controls = [...panel.querySelectorAll('[data-nhi-query-field]')];
        const currentState = readNhiQueryState(card.id);
        const values = { ...currentState.values };
        affectedNhiFields.forEach((field) => {
          const fieldControls = controls.filter(control => control.dataset.nhiQueryField === field.id);
          values[field.id] = field.type === 'multi_select'
            ? fieldControls.filter(control => control.checked).map(control => control.value)
            : (fieldControls[0]?.value || '').trim();
        });
        writeNhiQueryState(card.id, { fresh: currentState.fresh, values });
        showToast('已更新本次查詢條件');
        handleRoute({ preserveScroll: true });
      });

      // 複製為文字（依計畫書第九節輸出格式）
      document.getElementById('copy-quickref-btn').addEventListener('click', async () => {
        const lines = ['快速參考：' + card.zhName, ''];
        lines.push('應查指引：');
        lines.push('- ' + (effectivePrimaryGuideline || '尚未設定'));
        card.secondaryGuidelines.forEach(g => lines.push('- ' + g));
        lines.push('- 本機狀態：' + (hasDocs ? currentDocs.map(d => '已匯入 ' + (d.version || d.title)).join('、') : '尚未匯入'));
        if (filledPf.length) lines.push('- 目前情境：' + filledPf.map(f => pfValueText(f)).join('、'));
        if (secVisible.length) {
          lines.push('', '必查章節：');
          secVisible.forEach(({ ps, st }) => lines.push('- ' + ps.name + (ps.page ? '（p.' + ps.page + '）' : '') + (st === 'met' ? ' ✦' : '')));
          if (secHidden) lines.push('  （另有 ' + secHidden + ' 項情境相關章節未符合）');
        }
        if (clVisible.length) {
          lines.push('', '不要漏：');
          clVisible.forEach(({ c, st }) => lines.push('- [' + (c.checked ? 'x' : ' ') + '] ' + c.label + (st === 'met' ? '（↳ 因 ' + condLabel(c.condition) + '）' : '')));
          if (clHidden) lines.push('  （另有 ' + clHidden + ' 項情境相關項目未符合）');
        }
        if (filledPf.length) {
          lines.push('', '精準化資訊：');
          filledPf.forEach(f => lines.push('- ' + f.label + '：' + pfValueText(f)));
        }
        lines.push('', '健保給付：');
        if (selectedTreatment) {
          const selectedNotes = selectedTreatment.entries.map(({ n }) => n);
          const hasRelatedCoverage = selectedNotes.some(note => nhiCoverageStatus(note) === NHI_STATUS_RELATED);
          lines.push('- 已選擇：' + selectedTreatment.label);
          lines.push('- 比對層級：' + (nhiMatchLevelLabels[selectedNhiMatchLevel] || '待核對'));
          lines.push('- ' + (selectedNhiMatchLevel === 'component'
            ? '部分成分有相關健保規定；不代表整套療程給付'
            : selectedNhiMatchLevel === 'similar'
              ? '僅名稱相似，尚待人工核對是否為相同療程'
              : hasRelatedCoverage ? '健保有相關給付，但有限制條件' : '尚待確認是否有相關給付'));
          selectedTreatment.entries.forEach(({ n, st }, index) => {
            const ruleLabel = selectedTreatment.entries.length > 1 ? '給付條件 ' + (index + 1) : '給付條件';
            lines.push('- ' + ruleLabel + ' [' + nhiConditionStateText(st, n.condition) + ']');
            splitNhiRestrictions(n.content).forEach(item => lines.push('  • ' + item));
          });
        } else if (treatmentGroups.length) {
          lines.push('- 尚未選擇藥物／療程');
        } else {
          lines.push('- 尚未建立藥物／療程健保資料；這不代表沒有給付');
        }
        if (missingItems.length) {
          lines.push('', '目前資訊不足：');
          missingItems.forEach(m => lines.push('- ' + m));
        }
        lines.push('', '來源：' + (card.primaryGuideline || '待維護') + '｜更新日期：' + card.updatedAt);
        lines.push('此為快速參考，非最終治療建議');
        const text = lines.join('\n');
        try {
          await navigator.clipboard.writeText(text);
          showToast('已複製到剪貼簿');
        } catch {
          // 剪貼簿 API 不可用時的備援
          const ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); ta.remove();
          showToast('已複製到剪貼簿');
        }
      });
    }

        navigate('/cancer/' + card.id);
      });
    }

      return (title || '').normalize('NFKC')
        .replace(/\.pdf$/i, ' ')
        .replace(/\b20\d{2}\s*[._ -]*(?:v(?:ersion)?\s*)?\d+(?:\.\d+)*\b/gi, ' ')
        .replace(/\b(?:version|ver|v)?\s*\d+(?:\.\d+)*\s*[._ -]+20\d{2}\b/gi, ' ')
        .replace(/\b(?:version|ver|v)\s*\d+(?:\.\d+)*\b/gi, ' ')
        .replace(/\b20\d{2}\b/g, ' ')
        .replace(/[_\-.+()[\]{}]+/g, ' ')
        .toLowerCase()
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isSameGuidelineSeries(existingDoc, newDoc) {
      const existingSource = normalizeGuidelineSource(existingDoc.source);
      const newSource = normalizeGuidelineSource(newDoc.source);
      if (!existingSource || existingSource !== newSource) return false;
      const existingSeries = normalizeGuidelineSeries(existingDoc.title || existingDoc.fileName);
      const newSeries = normalizeGuidelineSeries(newDoc.title || newDoc.fileName);
      return !!existingSeries && existingSeries === newSeries;
    }

    async function archiveSupersededDocs(newDoc) {
      const all = await dbGetAll('documents');
      for (const r of all) {
        if (r.id === newDoc.id || !r.current) continue;
        const existingCancerIds = r.cancerIds || [];
        const newCancerIds = newDoc.cancerIds || [];
        const sharesCancer = existingCancerIds.some(cid => newCancerIds.includes(cid));
        const fullyCovered = existingCancerIds.every(cid => newCancerIds.includes(cid));
        if (sharesCancer && fullyCovered && isSameGuidelineSeries(r, newDoc)) {
          await dbPut('documents', { ...r, current: false, archived: true });
        }
      }
    }

              ${doc.storageKey && NCCN_PARSER.isNccnDocument(doc) && !doc.archived && doc.nccnParseError ? '<button class="btn btn-secondary btn-sm mt-3" onclick="window._parseNccnDoc(\'' + doc.id + '\')">重試此份 NCCN</button>' : ''}

      const showNhiParseModal = (title, body, busy = true) => {

      const parseNccnDocument = async (doc, onProgress) => {
        if (!doc?.storageKey) throw new Error('此文件需要重新匯入 PDF');
        const blob = await getPdfBlob(doc.storageKey);
        if (!blob) throw new Error('找不到 PDF 檔案本體');

          moduleUrl: new URL('./vendor/pdf.min.mjs', location.href).href,
          workerUrl: new URL('./vendor/pdf.worker.min.mjs', location.href).href,
          onProgress,
        });
        if (!result.sections.length && !result.redirectGuidelines?.length) throw new Error('沒有辨識到 NCCN 章節代碼；PDF 可能是掃描檔或版面不支援');
        await dbPut('documents', { ...doc, version: result.version || doc.version, pageCount: result.pageCount, nccnStructure: result, nccnParseError: null });

        let completed = 0;

        for (let index = 0; index < targets.length; index++) {

            await parseNccnDocument(doc, ({ pageNumber, pageCount }) => {

          await new Promise(resolve => setTimeout(resolve, 0));

        const failureHtml = failures.length ? '<div class="alert alert-warning mt-3"><p class="font-semibold">' + failures.length + ' 份需要核對</p><ul class="text-xs mt-2" style="padding-left:18px;list-style:disc">' + failures.slice(0, 10).map(item => '<li>' + esc(item) + '</li>').join('') + '</ul></div>' : '';
        showNhiParseModal('NCCN 索引完成', '<div class="alert alert-info"><p class="font-semibold">已完成 ' + completed + ' / ' + targets.length + ' 份</p><p class="text-xs mt-1">已建立版本、章節、單一療程、建議等級、適用條件與原始 PDF 頁碼。</p></div>' + failureHtml, false);

      window._parseNhiDoc = async (id) => {

        if (!confirm(`開始解析「${doc.title}」？解析會在本機進行，可能需要一些時間。`)) return;
        const modal = showNhiParseModal('解析健保給付規定', '<p class="text-sm text-gray-600">準備讀取 PDF…</p>');

          const blob = await getPdfBlob(doc.storageKey);

          const today = new Date().toISOString().split('T')[0];
          const notes = uniqueCandidates.map(candidate => ({
            id: `nhi-auto-${doc.id}-${candidate.sourceSection.replace(/[^a-z0-9.]/gi, '-')}-${candidate.cancerId}`,
            cancerId: candidate.cancerId,
            label: candidate.label,
            content: candidate.content,
            coverageStatus: candidate.coverageStatus,
            condition: null,
            sourceDocumentId: doc.id,
            sourcePageStart: candidate.sourcePageStart,
            sourcePageEnd: candidate.sourcePageEnd,
            sourceSection: candidate.sourceSection,
            extractedConditionHints: candidate.conditionHints,
            extractionStatus: candidate.extractionStatus,
            autoExtracted: true,
            autoExtractionScope: result.scope,
            ruleKey: window.NHI_VERSIONING.ruleKey(candidate.cancerId, candidate.label),
            sourceTitle: doc.title,
            sourceVersion: doc.version || result.documentDate || "",
            publishedDate: result.publishedDate || "",
            effectiveDate: result.effectiveDate || result.publishedDate || "",
            current: true,
            archived: false,
            updatedAt: today,
          }));
          const superseded = window.NHI_VERSIONING.archiveSuperseded(allNotes, notes, today);
          await dbPutMany('nhiNotes', notes);
          if (superseded.length) await dbPutMany('nhiNotes', superseded);
          const newNoteIds = new Set(notes.map(note => note.id));
          const supersededIds = new Set(superseded.map(note => note.id));
          const removedFromCurrentSource = oldAutoNotes.filter(note => !newNoteIds.has(note.id) && !supersededIds.has(note.id))
            .map(note => ({ ...note, current: false, archived: true, supersededAt: today }));
          if (removedFromCurrentSource.length) await dbPutMany('nhiNotes', removedFromCurrentSource);
          const cancerCount = new Set(notes.map(note => note.cancerId)).size;
          const reviewCount = notes.filter(note => note.extractionStatus === 'review_needed').length;
          await dbPut('documents', {
            ...doc,
            pageCount: result.pageCount,
            nhiExtraction: {
              extractedAt: today,
              entryCount: result.entries.length,
              noteCount: notes.length,
              cancerCount,
              unmatchedCount: result.unmatched.length,
              reviewCount,
              lowTextPages: result.lowTextPages,
              publishedDate: result.publishedDate || "",
              effectiveDate: result.effectiveDate || result.publishedDate || "",
              scope: result.scope,
            },
          });
          const warning = result.lowTextPages ? `<p class="text-xs mt-2" style="color:var(--amber-700)">有 ${result.lowTextPages} 頁文字很少，可能包含掃描頁或表格，建議抽查。</p>` : '';
          showNhiParseModal('健保規定解析完成', `<div class="alert alert-info"><p class="font-semibold">已載入 ${notes.length} 筆藥物／癌別資料</p><p class="text-xs mt-1">辨識 ${result.entries.length} 個條目，對應 ${cancerCount} 個癌別；${result.unmatched.length} 個條目未找到癌別，${reviewCount} 筆標示待核對。</p>${warning}</div><p class="text-xs text-gray-500">清楚條文已載入為「有相關給付但有限制條件」；個案是否符合仍需依條文與必要文件核對。</p>`, false);
        } catch (error) {
          showNhiParseModal('無法完成解析', `<div class="alert alert-warning"><p class="font-semibold">${esc(error?.message || '解析失敗')}</p></div><p class="text-xs text-gray-500">原 PDF 與既有手動健保資料均未變更。</p>`, false);
        }
      };

      window._setCurrent = async (id) => {
        const doc = await dbGet('documents', id);
        if (!doc) return;
        await archiveSupersededDocs(doc);
        await dbPut('documents', { ...doc, current: true, archived: false });
        showToast('已設為目前版本');
        navigate('/pdf-library');
      };
      window._archiveDoc = async (id) => {
        const doc = await dbGet('documents', id);
        if (doc) { await dbPut('documents', { ...doc, archived: true, current: false }); showToast('已封存'); navigate('/pdf-library'); }
      };
      window._deleteDoc = async (id) => {
        const doc = await dbGet('documents', id);
        if (!doc || !confirm(`確定刪除「${doc.title} (${doc.version})」？`)) return;
        if (doc.storageKey) await deletePdf(doc.storageKey);
        await dbDelete('documents', id);
        showToast('已刪除');
        navigate('/pdf-library');
      };
    }

    async function renderBatchImport(app) {
      const cancerCards = await dbGetAll('cancerCards');
      const cancerOptions = (selectedId) => cancerCards.map(c =>
        `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${esc(c.zhName)}（${esc(c.enName)}）</option>`
      ).join('');

      app.innerHTML = `
        <div class="container">
          <button class="back-btn" onclick="navigate('/pdf-library')">← 返回</button>
          <h1 class="text-2xl font-bold mb-1">批次匯入 PDF</h1>
          <p class="text-sm text-gray-500 mb-4">一次選多個 PDF，依檔名自動判斷癌別、來源與版本；匯入前可逐筆調整。</p>
          <div class="form-group">
            <input type="file" id="batch-files" accept=".pdf,application/pdf" multiple class="input" style="padding:8px">
          </div>
          <label class="checkbox-wrap mb-4"><input type="checkbox" id="batch-current" checked> <span class="text-sm text-gray-700">全部設為目前版本</span></label>
          <div id="batch-summary" class="hidden" aria-live="polite"></div>
          <div id="batch-progress" class="batch-progress hidden" aria-live="polite"></div>
          <div id="batch-list"></div>
          <div id="batch-pagination" class="batch-pagination hidden"></div>
          ${sourceDatalist()}
          <button class="btn btn-primary hidden mb-4" id="batch-submit"></button>
          ${renderNav('pdf')}
        </div>
      `;

      const PAGE_SIZE = 10;
      const cancerNameById = Object.fromEntries(cancerCards.map(card => [card.id, card.zhName]));
      let pending = [];
      let pageIndex = 0;
      let importing = false;
      let storageEstimate = null;
      let rejectedCount = 0;
      const listEl = document.getElementById('batch-list');
      const summaryEl = document.getElementById('batch-summary');
      const progressEl = document.getElementById('batch-progress');
      const paginationEl = document.getElementById('batch-pagination');
      const submitBtn = document.getElementById('batch-submit');

      const formatBytes = (bytes) => {
        if (!Number.isFinite(bytes) || bytes <= 0) return '0 MB';
        if (bytes >= 1024 ** 3) return (bytes / 1024 ** 3).toFixed(2) + ' GB';
        return (bytes / 1024 ** 2).toFixed(1) + ' MB';
      };
      const getStorageEstimate = async () => {
        if (!navigator.storage?.estimate) return null;
        try { return await navigator.storage.estimate(); } catch { return null; }
      };
      const actionableItems = () => pending.filter(item => item.status !== 'done');
      const storageState = () => {
        const remaining = storageEstimate?.quota != null
          ? Math.max(0, storageEstimate.quota - (storageEstimate.usage || 0))
          : null;
        const required = actionableItems().reduce((sum, item) => sum + (item.file.size || 0), 0);
        return { remaining, required, blocked: remaining != null && required > remaining * 0.95 };
      };
      const statusTag = (item) => {
        if (item.status === 'done') return '<span class="status status-maintained">已完成</span>';
        if (item.status === 'error') return '<span class="tag tag-required">失敗</span>';
        if (item.status === 'importing') return '<span class="tag tag-category">匯入中</span>';
        return '<span class="tag">待匯入</span>';
      };

      const renderSummary = () => {
        if (!pending.length) {
          summaryEl.classList.add('hidden');
          submitBtn.classList.add('hidden');
          return false;
        }
        const doneCount = pending.filter(item => item.status === 'done').length;
        const errorCount = pending.filter(item => item.status === 'error').length;
        const waitingCount = pending.length - doneCount - errorCount;
        const totalBytes = pending.reduce((sum, item) => sum + (item.file.size || 0), 0);
        const storage = storageState();
        summaryEl.classList.remove('hidden');
        summaryEl.innerHTML = `<div class="batch-summary">
          <p class="font-semibold text-blue-800">已選 ${pending.length} 份 PDF · ${formatBytes(totalBytes)}</p>
          <p class="text-xs text-blue-700 mt-1">已完成 ${doneCount} · 待處理 ${waitingCount} · 失敗 ${errorCount}${rejectedCount ? ` · 非 PDF ${rejectedCount}` : ''}</p>
          ${storage.remaining != null ? `<p class="text-xs text-blue-700 mt-1">瀏覽器估計可用空間：${formatBytes(storage.remaining)}</p>` : ''}
          ${storage.blocked ? `<p class="text-xs mt-2" style="color:var(--red-500)">所需空間超過瀏覽器目前估計可用空間</p>` : ''}
        </div>`;

        const actionCount = actionableItems().length;
        submitBtn.classList.toggle('hidden', actionCount === 0);
        submitBtn.disabled = importing || storage.blocked || actionCount === 0;
        if (importing) submitBtn.textContent = '匯入中…';
        else if (errorCount && waitingCount === 0) submitBtn.textContent = '重試失敗（' + errorCount + ' 份）';
        else if (doneCount) submitBtn.textContent = '繼續匯入（' + actionCount + ' 份）';
        else submitBtn.textContent = '匯入全部（' + actionCount + ' 份）';
        return storage.blocked;
      };

      const syncRows = () => {
        listEl.querySelectorAll('[data-row]').forEach(row => {
          const item = pending[Number(row.dataset.row)];
          if (!item || item.status === 'done') return;
          item.title = row.querySelector('.b-title').value.trim();
          const selectedCancerId = row.querySelector('.b-cancer').value;
          if (selectedCancerId !== item.cancerId) {
            item.cancerIds = selectedCancerId ? [selectedCancerId] : [];
            item.guidelineId = '';
          }
          item.cancerId = selectedCancerId;
          item.source = row.querySelector('.b-source').value.trim();
          item.version = row.querySelector('.b-version').value.trim();
        });
      };

      const renderRows = () => {
        const pageCount = Math.max(1, Math.ceil(pending.length / PAGE_SIZE));
        pageIndex = Math.max(0, Math.min(pageIndex, pageCount - 1));
        const start = pageIndex * PAGE_SIZE;
        const visible = pending.slice(start, start + PAGE_SIZE);
        listEl.innerHTML = visible.map((item, offset) => {
          const index = start + offset;
          const locked = importing || item.status === 'done';
          return `<div class="card" data-row="${index}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
              <p class="text-xs text-gray-400 truncate mb-2" style="min-width:0">📄 ${esc(item.file.name)}</p>
              ${statusTag(item)}
            </div>
            ${item.error ? `<p class="text-xs batch-file-error mb-3">${esc(item.error)}</p>` : ''}
            <div class="form-group"><label class="label">指引名稱</label><input class="input b-title" value="${esc(item.title)}" ${locked ? 'disabled' : ''}></div>
            <div class="form-group"><label class="label">癌別</label>
              <select class="input b-cancer" ${locked ? 'disabled' : ''}>
                <option value="">（不指定，之後再編輯）</option>
                ${cancerOptions(item.cancerId)}
              </select>
              ${item.cancerIds?.length > 1 ? `<p class="text-xs mt-1" style="color:var(--primary-600)">此 NCCN 指引自動對應 ${item.cancerIds.length} 個分類：${esc(item.cancerIds.map(id => cancerNameById[id] || id).join('、'))}</p>` : item.cancerId ? '' : '<p class="text-xs mt-1" style="color:var(--amber-700)">無法從檔名判斷，請手動選擇</p>'}
            </div>
            <div class="form-row">
              <div class="form-group"><label class="label">來源</label><input class="input b-source" list="source-presets" value="${esc(item.source)}" ${locked ? 'disabled' : ''}></div>
              <div class="form-group"><label class="label">版本</label><input class="input b-version" value="${esc(item.version)}" ${locked ? 'disabled' : ''}></div>
            </div>
            ${!locked ? '<button class="btn btn-ghost btn-sm text-red-500 b-remove">移除此筆</button>' : ''}
          </div>`;
        }).join('');

        paginationEl.classList.toggle('hidden', pending.length <= PAGE_SIZE);
        paginationEl.innerHTML = pending.length > PAGE_SIZE ? `
          <button type="button" class="btn btn-ghost btn-sm" id="batch-prev" ${pageIndex === 0 || importing ? 'disabled' : ''}>上一頁</button>
          <span class="text-sm text-gray-500">${pageIndex + 1} / ${pageCount}</span>
          <button type="button" class="btn btn-ghost btn-sm" id="batch-next" ${pageIndex >= pageCount - 1 || importing ? 'disabled' : ''}>下一頁</button>
        ` : '';

        listEl.querySelectorAll('.b-remove').forEach(button => button.addEventListener('click', () => {
          syncRows();
          pending.splice(Number(button.closest('[data-row]').dataset.row), 1);
          renderRows();
        }));
        document.getElementById('batch-prev')?.addEventListener('click', () => {
          syncRows(); pageIndex--; renderRows(); window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        document.getElementById('batch-next')?.addEventListener('click', () => {
          syncRows(); pageIndex++; renderRows(); window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        renderSummary();
      };

      document.getElementById('batch-files').addEventListener('change', async (event) => {
        if (importing) return;
        const selected = [...event.target.files];
        const pdfFiles = selected.filter(file => file.type === 'application/pdf' || /\.pdf$/i.test(file.name));
        rejectedCount = selected.length - pdfFiles.length;
        pending = pdfFiles.map(file => {
          const base = file.name.replace(/\.pdf$/i, '');
          const matchedGuideline = findNccnGuideline(file.name);
          const guessedCancer = guessCancer(file.name, cancerCards);
          return {
            file,
            title: base.replace(/[_]+/g, ' ').trim(),
            cancerId: matchedGuideline?.cardId || guessedCancer?.id || '',
            cancerIds: matchedGuideline?.cardIds || (guessedCancer ? [guessedCancer.id] : []),
            guidelineId: matchedGuideline?.id || '',
            source: guessSource(file.name) || (matchedGuideline ? 'NCCN' : ''),
            version: guessVersion(base),
            status: 'queued',
            error: '',
          };
        });
        pageIndex = 0;
        progressEl.classList.add('hidden');
        storageEstimate = await getStorageEstimate();
        renderRows();
      });

      submitBtn.addEventListener('click', async () => {
        if (importing) return;
        syncRows();
        const targets = actionableItems();
        const missingTitle = targets.findIndex(item => !item.title);
        if (missingTitle >= 0) { showToast('待處理檔案中有一筆缺少指引名稱'); return; }
        storageEstimate = await getStorageEstimate();
        if (renderSummary()) { showToast('瀏覽器儲存空間不足'); return; }

        targets.forEach(item => { item.status = 'queued'; item.error = ''; });
        importing = true;
        const setAsCurrent = document.getElementById('batch-current').checked;
        const today = new Date().toISOString().split('T')[0];
        let successCount = 0;
        let failureCount = 0;
        let stoppedForQuota = false;
        let wakeLock = null;
        try { wakeLock = await navigator.wakeLock?.request('screen'); } catch {}
        renderRows();

        for (let index = 0; index < targets.length; index++) {
          const item = targets[index];
          item.status = 'importing';
          progressEl.classList.remove('hidden');
          progressEl.innerHTML = `<p class="font-semibold text-gray-800">匯入中 ${index + 1} / ${targets.length}</p><p class="text-xs text-gray-500 mt-1 truncate">${esc(item.file.name)}</p>`;
          renderSummary();
          try {
            const storageKey = await storePdf(item.file);
            const docData = {
              id: crypto.randomUUID(),
              title: item.title,
              source: item.source,
              version: item.version,
              nccnGuidelineId: item.guidelineId || '',
              cancerIds: item.cancerIds || (item.cancerId ? [item.cancerId] : []),
              fileName: item.file.name,
              storageKey,
              pageCount: 0,
              importedAt: today,
              current: setAsCurrent,
              archived: false,
              notes: '',
            };
            try {
              await dbPut('documents', docData);
            } catch (error) {
              try { await deletePdf(storageKey); } catch {}
              throw error;
            }
            for (const cardId of docData.cancerIds) {
              const card = await dbGet('cancerCards', cardId);
              if (card && !card.documentIds.includes(docData.id)) {
                await dbPut('cancerCards', { ...card, documentIds: [...card.documentIds, docData.id], updatedAt: today });
              }
            }
            if (setAsCurrent && docData.cancerIds.length) await archiveSupersededDocs(docData);
            item.status = 'done';
            successCount++;
          } catch (error) {
            item.status = 'error';
            item.error = error?.message || '未知錯誤';
            failureCount++;
            if (item.error.includes('儲存空間不足')) { stoppedForQuota = true; break; }
          }
          await new Promise(resolve => setTimeout(resolve, 0));
        }

        try { await wakeLock?.release(); } catch {}
        importing = false;
        storageEstimate = await getStorageEstimate();
        const firstFailure = pending.findIndex(item => item.status === 'error');
        if (firstFailure >= 0) pageIndex = Math.floor(firstFailure / PAGE_SIZE);
        renderRows();

        const allDone = pending.length > 0 && pending.every(item => item.status === 'done');
        if (allDone) {
          progressEl.innerHTML = `<p class="font-semibold text-gray-800">已完成 ${pending.length} 份 PDF</p>`;
          showToast('已匯入 ' + pending.length + ' 份 PDF');
          navigate('/pdf-library');
          return;
        }
        const remainingCount = actionableItems().length;
        progressEl.classList.remove('hidden');
        progressEl.innerHTML = `<p class="font-semibold text-gray-800">本次完成 ${successCount} 份，失敗 ${failureCount} 份</p><p class="text-xs text-gray-500 mt-1">尚有 ${remainingCount} 份可繼續或重試${stoppedForQuota ? '；目前儲存空間不足' : ''}</p>`;
        showToast('已保留成功項目，可只重試失敗檔案');
      });
    }
