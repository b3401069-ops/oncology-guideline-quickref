  <script type="module">
    // ========== Database ==========
    const DB_NAME = 'OncologyGuidelineDB';
    const DB_VERSION = 1;
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('cancerCards')) {
            const store = db.createObjectStore('cancerCards', { keyPath: 'id' });
            store.createIndex('category', 'category');
            store.createIndex('zhName', 'zhName');
          }
          if (!db.objectStoreNames.contains('documents')) {
            const store = db.createObjectStore('documents', { keyPath: 'id' });
            store.createIndex('cancerIds', 'cancerIds', { multiEntry: true });
          }
          if (!db.objectStoreNames.contains('checklists')) {
            const store = db.createObjectStore('checklists', { keyPath: 'id' });
            store.createIndex('cancerId', 'cancerId');
          }
          if (!db.objectStoreNames.contains('precisionFields')) {
            const store = db.createObjectStore('precisionFields', { keyPath: 'id' });
            store.createIndex('cancerId', 'cancerId');
          }
          if (!db.objectStoreNames.contains('nhiNotes')) {
            const store = db.createObjectStore('nhiNotes', { keyPath: 'id' });
            store.createIndex('cancerId', 'cancerId');
          }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(db); };
        req.onerror = (e) => reject(e.target.error);
      });
    }

    // PDF storage (separate DB for large files)
    function openPdfDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('OncologyPdfStorage', 1);
        req.onupgradeneeded = (e) => {
          e.target.result.createObjectStore('pdfs');
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e.target.error);
      });
    }

    function dbGetAll(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbGet(storeName, id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).get(id);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbPut(storeName, data) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).put(data);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbDelete(storeName, id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).delete(id);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    function dbClear(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).clear();
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    async function seedDatabase() {
      const count = await dbGetAll('cancerCards');
      if (count.length > 0) return;
      const today = new Date().toISOString().split('T')[0];
      for (const [category, cancers] of Object.entries(CATEGORIES)) {
        for (const c of cancers) {
          await dbPut('cancerCards', {
            id: ID_MAP[c.zh],
            category,
            zhName: c.zh,
            enName: c.en,
            synonyms: c.syn,
            primaryGuideline: '',
            secondaryGuidelines: [],
            documentIds: [],
            mustReadSections: [],
            checklistIds: [],
            precisionFieldIds: [],
            nhiNoteIds: [],
            externalLinks: [],
            reviewStatus: '待維護',
            updatedAt: today,
          });
        }
      }
    }

    // ========== PDF Helpers ==========
    async function storePdf(file) {
      const pdfDb = await openPdfDB();
      const key = 'pdf-' + crypto.randomUUID();
      const buf = await file.arrayBuffer();
      return new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').put(buf, key);
        tx.oncomplete = () => { pdfDb.close(); resolve(key); };
        tx.onerror = () => { pdfDb.close(); reject(new Error('無法儲存 PDF')); };
      });
    }

    async function getPdfBlob(key) {
      const pdfDb = await openPdfDB();
      return new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readonly');
        const req = tx.objectStore('pdfs').get(key);
        req.onsuccess = () => {
          pdfDb.close();
          resolve(req.result ? new Blob([req.result], { type: 'application/pdf' }) : null);
        };
        req.onerror = () => { pdfDb.close(); reject(new Error('無法讀取 PDF')); };
      });
    }

    async function deletePdf(key) {
      const pdfDb = await openPdfDB();
      return new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').delete(key);
        tx.oncomplete = () => { pdfDb.close(); resolve(); };
        tx.onerror = () => { pdfDb.close(); reject(new Error('無法刪除 PDF')); };
      });
    }

    async function openPdf(key) {
      const blob = await getPdfBlob(key);
      if (!blob) throw new Error('找不到 PDF 檔案');
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }

    // ========== Backup ==========
    async function exportBackup() {
      const [cancerCards, documents, checklists, precisionFields, nhiNotes] = await Promise.all([
        dbGetAll('cancerCards'), dbGetAll('documents'), dbGetAll('checklists'),
        dbGetAll('precisionFields'), dbGetAll('nhiNotes')
      ]);
      return {
        version: 1, exportedAt: new Date().toISOString(),
        cancerCards,
        documents: documents.map(d => ({ ...d, storageKey: null })),
        checklists, precisionFields, nhiNotes
      };
    }

    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function importBackup(file) {
      const text = await file.text();
      const data = JSON.parse(text);
      if (data.version !== 1) throw new Error('備份格式不相容');
      for (const store of ['cancerCards','documents','checklists','precisionFields','nhiNotes']) {
        await dbClear(store);
        if (data[store]?.length) {
          for (const item of data[store]) await dbPut(store, item);
        }
      }
    }

    // ========== Search ==========
    function searchCards(cards, query) {
      if (!query.trim()) return cards;
      const q = query.toLowerCase().trim();
      return cards.filter(c =>
        c.zhName.toLowerCase().includes(q) ||
        c.enName.toLowerCase().includes(q) ||
        c.id.toLowerCase().includes(q) ||
        c.synonyms.some(s => s.toLowerCase().includes(q)) ||
        c.category.toLowerCase().includes(q)
      );
    }

    // ========== Toast ==========
    function showToast(msg, duration = 2500) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), duration);
    }

    // ========== Router ==========
    let currentRoute = '/';
    let routeParams = {};

    function navigate(path) {
      currentRoute = path;
      routeParams = {};
      // Parse route params
      const parts = path.split('/').filter(Boolean);
      if (parts[0] === 'cancer' && parts[1]) {
        routeParams.cancerId = parts[1];
        routeParams.sub = parts[2] || '';
      } else if (parts[0] === 'pdf-library' && parts[1] === 'import') {
        routeParams.docId = parts[2] || '';
      }
      render();
      window.scrollTo(0, 0);
    }

    // ========== Render Engine ==========
    async function render() {
      const app = document.getElementById('app');
      if (currentRoute === '/') {
        await renderHomePage(app);
      } else if (currentRoute.startsWith('/cancer/') && !routeParams.sub) {
        await renderCancerDetail(app);
      } else if (routeParams.sub === 'quickref') {
        await renderQuickRef(app);
      } else if (routeParams.sub === 'edit') {
        await renderEditCancer(app);
      } else if (routeParams.sub === 'checklist') {
        await renderChecklist(app);
      } else if (routeParams.sub === 'precision') {
        await renderPrecision(app);
      } else if (routeParams.sub === 'nhi') {
        await renderNhi(app);
      } else if (currentRoute === '/pdf-library' && !routeParams.docId) {
        await renderPdfLibrary(app);
      } else if (currentRoute.startsWith('/pdf-library/import')) {
        await renderImportPdf(app);
      } else if (currentRoute === '/settings') {
        await renderSettings(app);
      } else {
        navigate('/');
      }
    }

    async function renderPdfLibrary(app) {
      const docs = await dbGetAll('documents');
      const cancerCards = await dbGetAll('cancerCards');
      const nameMap = {};
      cancerCards.forEach(c => nameMap[c.id] = c.zhName);

      const sources = [...new Set(docs.map(d => d.source).filter(Boolean))].sort();

      app.innerHTML = `
        <div class="container">
          <div class="flex-between mb-6">
            <h1 class="text-2xl font-bold">PDF 文件庫</h1>
            <button class="btn btn-primary btn-sm" style="width:auto;padding:8px 16px" onclick="navigate('/pdf-library/import')">+ 匯入</button>
          </div>

          <div class="filter-bar">
            <button class="filter-chip active" data-source="">全部</button>
            ${sources.map(s => `<button class="filter-chip" data-source="${s}">${s}</button>`).join('')}
          </div>

          <label class="checkbox-wrap mb-4">
            <input type="checkbox" id="show-archived"> <span class="text-sm text-gray-600">顯示封存版本</span>
          </label>

          <div id="pdf-list"></div>
          ${renderNav('pdf')}
        </div>
      `;

      const renderList = () => {
        const filterSource = document.querySelector('.filter-chip.active')?.dataset.source || '';
        const showArchived = document.getElementById('show-archived')?.checked;

        let filtered = docs;
        if (filterSource) filtered = filtered.filter(d => d.source === filterSource);
        if (!showArchived) filtered = filtered.filter(d => !d.archived);
        filtered.sort((a, b) => { if (a.current && !b.current) return -1; if (!a.current && b.current) return 1; return (b.importedAt||'').localeCompare(a.importedAt||''); });

        const listEl = document.getElementById('pdf-list');
        if (filtered.length === 0) {
          listEl.innerHTML = '<div class="empty-state"><p class="mb-4">尚無 PDF 文件</p><button class="btn btn-primary" onclick="navigate(\'/pdf-library/import\')">匯入第一份 PDF</button></div>';
          return;
        }

        listEl.innerHTML = filtered.map(doc => {
          const tags = doc.cancerIds.map(cid => `<span class="tag tag-category">${nameMap[cid] || cid}</span>`).join(' ');
          return `
            <div class="card">
              <div class="flex-between gap-2 mb-2">
                <div class="min-w-0 flex-1">
                  <div class="flex items-center gap-2">
                    <p class="font-medium text-gray-900 truncate">${doc.title}</p>
                    ${doc.current ? '<span class="status status-maintained">目前版本</span>' : ''}
                    ${doc.archived ? '<span class="status status-pending">已封存</span>' : ''}
                  </div>
                  <p class="text-xs text-gray-500 mt-1">${doc.source} · ${doc.version}</p>
                </div>
              </div>
              ${tags ? `<div class="flex gap-1 mb-3">${tags}</div>` : ''}
              <div class="flex gap-2">
                <button class="btn btn-ghost btn-sm flex-1" onclick="openPdf('${doc.storageKey}')">開啟</button>
                ${!doc.current && !doc.archived ? `<button class="btn btn-ghost btn-sm text-green-600" onclick="window._setCurrent('${doc.id}')">設為目前</button>` : ''}
                ${!doc.archived ? `<button class="btn btn-ghost btn-sm text-gray-500" onclick="window._archiveDoc('${doc.id}')">封存</button>` : ''}
                <button class="btn btn-ghost btn-sm text-red-500" onclick="window._deleteDoc('${doc.id}')">刪除</button>
              </div>
            </div>
          `;
        }).join('');
      };

      // Filter chips
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          renderList();
        });
      });
      document.getElementById('show-archived').addEventListener('change', renderList);
      renderList();

      window._setCurrent = async (id) => {
        const doc = await dbGet('documents', id);
        if (!doc) return;
        for (const cid of doc.cancerIds) {
          const related = (await dbGetAll('documents')).filter(d => d.cancerIds?.includes(cid));
          for (const r of related) {
            if (r.id !== id && r.current) await dbPut('documents', { ...r, current: false, archived: true });
          }
        }
        await dbPut('documents', { ...doc, current: true, archived: false });
        showToast('已設為目前版本');
        navigate('/pdf-library');
      };
      window._archiveDoc = async (id) => {
        const doc = await dbGet('documents', id);
        if (doc) { await dbPut('documents', { ...doc, archived: true, current: false }); showToast('已封存'); navigate('/pdf-library'); }
      };
      window._deleteDoc = async (id) => {
        const doc = await dbGet('documents', id);
        if (!doc || !confirm(`確定刪除「${doc.title} (${doc.version})」？`)) return;
        if (doc.storageKey) await deletePdf(doc.storageKey);
        await dbDelete('documents', id);
        showToast('已刪除');
        navigate('/pdf-library');
      };
    }

    async function renderImportPdf(app) {
      const cancerCards = await dbGetAll('cancerCards');
      const existingDoc = routeParams.docId ? await dbGet('documents', routeParams.docId) : null;

      app.innerHTML = `
        <div class="container">
          <button class="back-btn" onclick="navigate('/pdf-library')">← 返回</button>
          <h1 class="text-2xl font-bold mb-6">${existingDoc ? '編輯文件' : '匯入 PDF'}</h1>

          <form id="import-form">
            <div class="form-group">
              <label class="label">選擇 PDF</label>
              <input type="file" id="pdf-file" accept=".pdf" class="input" style="padding:8px">
            </div>
            <div class="form-group"><label class="label">指引名稱 *</label><input class="input" id="imp-title" value="${existingDoc?.title || ''}" required placeholder="NCCN Biliary Tract Cancers"></div>
            <div class="form-group"><label class="label">來源</label><input class="input" id="imp-source" value="${existingDoc?.source || ''}" placeholder="NCCN、ESMO"></div>
            <div class="form-group"><label class="label">版本</label><input class="input" id="imp-version" value="${existingDoc?.version || ''}" placeholder="2026.V2"></div>

            <div class="form-group">
              <label class="label">對應癌別（可多選）</label>
              <div class="border rounded-xl p-2 overflow-y-auto max-h-64" style="border-color:var(--gray-200)">
                ${cancerCards.map(c => `
                  <label class="checkbox-wrap" style="padding:6px 8px;border-radius:8px">
                    <input type="checkbox" class="cancer-cb" value="${c.id}" ${existingDoc?.cancerIds?.includes(c.id)?'checked':''}>
                    <span class="text-sm text-gray-700">${c.zhName}</span>
                    <span class="text-xs text-gray-400">${c.enName}</span>
                  </label>
                `).join('')}
              </div>
            </div>

            <label class="checkbox-wrap mb-4"><input type="checkbox" id="imp-current" checked> <span class="text-sm text-gray-700">設為目前版本</span></label>

            <div class="form-group"><label class="label">備註</label><textarea class="input" id="imp-notes" rows="3">${existingDoc?.notes || ''}</textarea></div>

            <button type="submit" class="btn btn-primary" id="imp-submit">${existingDoc ? '更新' : '匯入'}</button>
          </form>
          ${renderNav('pdf')}
        </div>
      `;

      document.getElementById('import-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('imp-title').value.trim();
        if (!title) { showToast('請填寫指引名稱'); return; }

        const fileInput = document.getElementById('pdf-file');
        const file = fileInput.files[0];

        let storageKey = existingDoc?.storageKey || '';
        if (file) {
          if (file.type !== 'application/pdf') { showToast('請選擇 PDF 檔案'); return; }
          if (existingDoc?.storageKey) await deletePdf(existingDoc.storageKey);
          storageKey = await storePdf(file);
        }

        const selectedCancers = [...document.querySelectorAll('.cancer-cb:checked')].map(cb => cb.value);
        const setAsCurrent = document.getElementById('imp-current').checked;

        const docData = {
          id: existingDoc?.id || crypto.randomUUID(),
          title,
          source: document.getElementById('imp-source').value.trim(),
          version: document.getElementById('imp-version').value.trim(),
          cancerIds: selectedCancers,
          fileName: file?.name || existingDoc?.fileName || '',
          storageKey,
          pageCount: 0,
          importedAt: new Date().toISOString().split('T')[0],
          current: setAsCurrent,
          archived: false,
          notes: document.getElementById('imp-notes').value.trim(),
        };

        await dbPut('documents', docData);

        // Update cancer card documentIds
        for (const cid of selectedCancers) {
          const card = await dbGet('cancerCards', cid);
          if (card && !card.documentIds.includes(docData.id)) {
            await dbPut('cancerCards', { ...card, documentIds: [...card.documentIds, docData.id], updatedAt: docData.importedAt });
          }
        }

        // Archive others if setting as current
        if (setAsCurrent) {
          for (const cid of selectedCancers) {
            const related = (await dbGetAll('documents')).filter(d => d.cancerIds?.includes(cid));
            for (const r of related) {
              if (r.id !== docData.id && r.current) await dbPut('documents', { ...r, current: false, archived: true });
            }
          }
        }

        showToast(existingDoc ? '已更新文件' : '已匯入 PDF');
        navigate('/pdf-library');
      });
    }

    async function renderSettings(app) {
      let dbSize = '計算中...';
      if (navigator.storage?.estimate) {
        const est = await navigator.storage.estimate();
        dbSize = ((est.usage || 0) / 1024 / 1024).toFixed(2) + ' MB';
      }

      app.innerHTML = `
        <div class="container">
          <h1 class="text-2xl font-bold mb-6">設定</h1>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">💾 備份與還原</h2>
            <div class="space-y-3">
              <button class="btn btn-primary" id="export-btn">匯出備份 JSON</button>
              <button class="btn btn-secondary" id="import-btn">匯入備份 JSON</button>
              <p class="text-xs text-gray-400">備份包含癌別卡、checklist、精準欄位、健保提醒與 PDF 元資料。PDF 檔案本體不含在備份中。</p>
            </div>
          </div>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">📊 資料庫資訊</h2>
            <p class="text-sm text-gray-600">目前使用空間：${dbSize}</p>
          </div>

          <div class="card mb-4" style="border-color:var(--red-100)">
            <h2 class="font-semibold mb-3" style="color:var(--red-600)">⚠️ 清除資料</h2>
            <div id="clear-section">
              <button class="btn btn-danger" id="clear-btn">清除本機所有資料</button>
            </div>
          </div>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">ℹ️ 關於</h2>
            <div class="space-y-2 text-sm text-gray-600">
              <p>App 版本：1.0.0</p>
              <p>名稱：腫瘤指引快速查</p>
              <p>用途：個人本機腫瘤指引查閱與防漏工具</p>
            </div>
          </div>

          <div class="card mb-4" style="border-color:var(--amber-200);background:var(--amber-50)">
            <h2 class="font-semibold mb-3" style="color:var(--amber-800)">⚠️ 使用邊界提醒</h2>
            <ul class="space-y-2 text-sm" style="color:var(--amber-700)">
              <li>• 本 App 不是院級醫療資訊系統</li>
              <li>• 不串接病人資料、不自動下載指引</li>
              <li>• 不輸出「最終治療建議」</li>
              <li>• 不上傳資料到雲端</li>
              <li>• 本 App 僅供個人查閱參考使用</li>
              <li>• 所有資料儲存於本機瀏覽器中</li>
            </ul>
          </div>

          <div class="text-center text-xs text-gray-400 mt-8 mb-4">
            <p>腫瘤指引快速查 v1.0.0</p>
            <p class="mt-1">Vanilla JS + IndexedDB + PWA</p>
          </div>
          ${renderNav('settings')}
        </div>
      `;

      document.getElementById('export-btn').addEventListener('click', async () => {
        const data = await exportBackup();
        downloadJSON(data, `oncology-guideline-backup-${new Date().toISOString().split('T')[0]}.json`);
        showToast('備份已匯出');
      });

      document.getElementById('import-btn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.json';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file || !confirm('匯入備份將覆蓋現有資料，確定繼續？')) return;
          try {
            await importBackup(file);
            showToast('備份已匯入');
            navigate('/');
          } catch (err) {
            showToast('匯入失敗：' + err.message);
          }
        };
        input.click();
      });

      document.getElementById('clear-btn').addEventListener('click', async () => {
        document.getElementById('clear-section').innerHTML = `
          <p class="text-sm mb-3" style="color:var(--red-600)">確定要清除所有資料？此操作無法復原！</p>
          <div class="flex gap-2">
            <button class="btn btn-danger flex-1" id="clear-confirm">確定清除</button>
            <button class="btn btn-secondary flex-1" id="clear-cancel">取消</button>
          </div>
        `;
        document.getElementById('clear-confirm').addEventListener('click', async () => {
          for (const store of ['cancerCards','documents','checklists','precisionFields','nhiNotes']) await dbClear(store);
          indexedDB.deleteDatabase('OncologyPdfStorage');
          showToast('資料已清除');
          window.location.reload();
        });
        document.getElementById('clear-cancel').addEventListener('click', () => { navigate('/settings'); });
      });
    }

    // ========== Init ==========
    async function init() {
      await openDB();
      await seedDatabase();

      // Handle initial URL
      const path = window.location.pathname;
      if (path !== '/' && path !== '/index.html') {
        currentRoute = path;
        const parts = path.split('/').filter(Boolean);
        if (parts[0] === 'cancer' && parts[1]) {
          routeParams.cancerId = parts[1];
          routeParams.sub = parts[2] || '';
        } else if (parts[0] === 'pdf-library' && parts[1] === 'import') {
          routeParams.docId = parts[2] || '';
        }
      }

      await render();
    }

    // Expose navigate globally
    window.navigate = (path) => {
      window.history.pushState({}, '', path);
      navigate(path);
    };

    // Handle back/forward
    window.addEventListener('popstate', () => {
      const path = window.location.pathname;
      currentRoute = path;
      const parts = path.split('/').filter(Boolean);
      routeParams = {};
      if (parts[0] === 'cancer' && parts[1]) {
        routeParams.cancerId = parts[1];
        routeParams.sub = parts[2] || '';
      } else if (parts[0] === 'pdf-library' && parts[1] === 'import') {
        routeParams.docId = parts[2] || '';
      }
      render();
    });

    // Expose PDF function
    window.openPdf = async (key) => {
      try { await openPdf(key); }
      catch (e) { showToast(e.message); }
    };

    init();

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(
          (reg) => console.log('SW registered:', reg.scope),
          (err) => console.log('SW registration failed:', err)
        );
      });
    }
  </script>
</body>
</html>
