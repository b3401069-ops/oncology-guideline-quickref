          <h1 class="text-2xl font-bold mb-6">設定</h1>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">💾 備份與還原</h2>
            <div class="space-y-3">
              <button class="btn btn-primary" id="export-btn">匯出資料備份（不含 PDF）</button>
              <button class="btn btn-secondary" id="export-pdf-batches-btn">分批備份 PDF</button>
              <div id="pdf-backup-panel" class="nhi-query-panel hidden"></div>
              <button class="btn btn-secondary" id="import-btn">匯入資料備份</button>
              <button class="btn btn-secondary" id="import-pdf-batches-btn">匯入 PDF 批次</button>
              ${latestRestoreSnapshot ? `<button class="btn btn-ghost" id="rollback-restore-btn">復原匯入前資料索引（不含 PDF） · ${esc(latestRestoreSnapshot.createdAt.split('T')[0])}</button>` : ''}
              ${pdfRestoreProgress ? `<div class="alert ${pdfRestoreProgress.complete ? 'alert-success' : 'alert-warning'}"><p class="font-semibold">PDF 還原批次 ${pdfRestoreProgress.restored.length} / ${pdfRestoreProgress.batchCount}</p><p class="text-xs mt-1">${pdfRestoreProgress.complete ? '所有批次均已補回。' : '尚缺第 ' + pdfRestoreProgress.missing.join('、') + ' 批。'}</p></div>` : ''}
              <p class="text-xs text-gray-400">先備份資料索引；PDF 每 5 份一批下載，避免 Android 一次載入全部檔案。v4 備份會檢查 SHA-256、批次完整性，且匯入資料前自動保留目前版本。</p>
              <p class="text-xs" style="color:var(--amber-700)">⚠️ 建議將本 App「加入主畫面」安裝使用，並定期匯出完整備份。瀏覽器在儲存空間不足時仍可能清除本機資料（含 PDF）。</p>
            </div>
          </div>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">📱 手機安裝</h2>
            <div class="space-y-3 text-sm text-gray-600">
              <p><strong>iPhone / iPad：</strong>用 Safari 開啟正式網址，按分享，再選「加入主畫面」。</p>
              <p><strong>Android：</strong>用 Chrome 開啟正式網址，選「安裝應用程式」或「加入主畫面」。</p>
              <p class="text-xs text-gray-400">需要 HTTPS 網址（例如 GitHub Pages）才能完整啟用安裝與離線快取。</p>
            </div>
          </div>
          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">📊 資料庫資訊</h2>
            <p class="text-sm text-gray-600">目前使用空間：${dbSize}</p>
            <p class="text-sm text-gray-600 mt-1">持久儲存：${persistStatus}</p>
            <p class="text-sm text-gray-600 mt-1">上次備份：${(() => { const t = localStorage.getItem('lastBackupAt'); if (!t) return '<span style="color:var(--amber-700)">尚未備份過</span>'; const d = Math.floor((Date.now() - new Date(t)) / 86400000); return esc(t.split('T')[0]) + (d > 14 ? `（<span style="color:var(--amber-700)">已 ${d} 天</span>）` : `（${d} 天前）`); })()}</p>
          </div>

          <div class="card mb-4" style="border-color:var(--red-100)">
            <h2 class="font-semibold mb-3" style="color:var(--red-600)">⚠️ 清除資料</h2>
            <div id="clear-section">
              <button class="btn btn-danger" id="clear-btn">清除本機所有資料</button>
            </div>
          </div>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">ℹ️ 關於</h2>
            <div class="space-y-2 text-sm text-gray-600">
              <p>App 版本：${esc(APP_VERSION)}</p>
              <p>名稱：腫瘤指引快速查</p>
              <p>用途：個人本機腫瘤指引查閱與防漏工具</p>
            </div>
          </div>

          <div class="card mb-4" style="border-color:var(--amber-200);background:var(--amber-50)">
            <h2 class="font-semibold mb-3" style="color:var(--amber-800)">⚠️ 使用邊界提醒</h2>
            <ul class="space-y-2 text-sm" style="color:var(--amber-700)">
              <li>• 本 App 不是院級醫療資訊系統</li>
              <li>• 不串接病人資料、不代替官方登入或批量下載受授權限制的指引</li>
              <li>• 不輸出「最終治療建議」</li>
              <li>• 不上傳資料到雲端</li>
              <li>• 本 App 僅供個人查閱參考使用</li>
              <li>• 所有資料儲存於本機瀏覽器中</li>
            </ul>
          </div>

          <div class="text-center text-xs text-gray-400 mt-8 mb-4">
            <p>腫瘤指引快速查 v${esc(APP_VERSION)}</p>
            <p class="mt-1">Vanilla JS + IndexedDB + PWA</p>
          </div>
          ${renderNav('settings')}
        </div>
      `;

      const markBackedUp = () => { localStorage.setItem('lastBackupAt', new Date().toISOString()); };

      document.getElementById('export-btn').addEventListener('click', async () => {
        const data = await exportBackup();
        downloadJSON(data, `oncology-guideline-backup-${new Date().toISOString().split('T')[0]}-${data.backupSetId.slice(0, 8)}.json`);
        markBackedUp();
        showToast('備份已匯出');
        navigate('/settings');
      });

      document.getElementById('export-pdf-batches-btn').addEventListener('click', async () => {
        const documents = await dbGetAll('documents');
        const plan = backupPlanForDocuments(documents);
        const batches = BACKUP_FORMAT.planPdfBatches(documents);
        const panel = document.getElementById('pdf-backup-panel');
        panel.classList.remove('hidden');
        if (!batches.length) {
          panel.innerHTML = '<p class="text-sm text-gray-500">目前沒有可備份的 PDF。</p>';
          return;
        }
        panel.innerHTML = `<p class="text-sm font-semibold text-gray-800">共 ${batches.length} 批，每批最多 ${BACKUP_FORMAT.pdfBatchSize} 份</p><p class="text-xs text-gray-500 mt-1">請逐批點擊下載，避免 Android 一次載入全部 PDF。</p><div class="space-y-2 mt-3">${batches.map((batch, index) => `<button type="button" class="btn btn-secondary btn-sm" data-pdf-backup-batch="${index}">第 ${index + 1} / ${batches.length} 批 · ${batch.length} 份</button>`).join('')}</div>`;
        panel.querySelectorAll('[data-pdf-backup-batch]').forEach(button => {
          button.addEventListener('click', async () => {
            const index = Number(button.dataset.pdfBackupBatch);
            button.disabled = true;
            button.textContent = '準備中…';
            try {
              const data = await exportPdfBackupBatch(batches[index], index + 1, batches.length, plan);
              downloadJSON(data, `oncology-guideline-pdf-${plan.backupSetId.slice(0, 8)}-batch-${String(index + 1).padStart(2, '0')}-of-${String(batches.length).padStart(2, '0')}.json`, true);
              button.textContent = `第 ${index + 1} 批已下載`;
            } catch (error) {
              button.disabled = false;
              button.textContent = `第 ${index + 1} 批重試`;
              showToast('PDF 批次匯出失敗：' + error.message);
            }
          });
        });
      });

      document.getElementById('import-btn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.json';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file || !confirm('匯入備份將覆蓋現有資料，確定繼續？')) return;
          try {
            const result = await importBackup(file);
            showToast('備份已安全匯入；已保留匯入前資料' + (result.migratedCaseValues ? '，並將舊個案值移至本次分頁' : ''));
            navigate('/');
          } catch (err) {
            showToast('匯入失敗：' + err.message);
          }
        };
        input.click();
      });

      document.getElementById('import-pdf-batches-btn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.json'; input.multiple = true;
        input.onchange = async (event) => {
          const files = [...event.target.files];
          if (!files.length) return;
          let restored = 0;
          let latestProgress = null;
          try {
            for (const file of files) {
              const result = await importPdfBackupBatch(file);
              restored += result.restoredPdfCount;
              latestProgress = result.progress;
            }
            showToast(`已補回 ${restored} 份 PDF；批次 ${latestProgress.restored.length} / ${latestProgress.batchCount}${latestProgress.complete ? '，已完整' : '，尚缺 ' + latestProgress.missing.join('、')}`);
            navigate('/pdf-library');
          } catch (error) {
            showToast('PDF 批次匯入失敗：' + error.message);
          }
        };
        input.click();
      });

      document.getElementById('rollback-restore-btn')?.addEventListener('click', async () => {
        if (!latestRestoreSnapshot || !confirm('以匯入前自動保留資料取代目前資料？')) return;
        await dbReplaceStores(latestRestoreSnapshot.data);
        window.CASE_STATE.clearAll();
        showToast('已復原匯入前資料索引；PDF 未變更');
        navigate('/');
      });

      document.getElementById('clear-btn').addEventListener('click', async () => {
        document.getElementById('clear-section').innerHTML = `
          <p class="text-sm mb-3" style="color:var(--red-600)">確定要清除所有資料？此操作無法復原！</p>
          <div class="flex gap-2">
            <button class="btn btn-danger flex-1" id="clear-confirm">確定清除</button>
            <button class="btn btn-secondary flex-1" id="clear-cancel">取消</button>
          </div>
        `;
        document.getElementById('clear-confirm').addEventListener('click', async () => {
          for (const store of ['cancerCards','documents','checklists','precisionFields','nhiNotes','restoreSnapshots']) await dbClear(store);
          window.CASE_STATE.clearAll();
          localStorage.removeItem(PDF_RESTORE_TRACKER_KEY);
          indexedDB.deleteDatabase('OncologyPdfStorage');
          showToast('資料已清除');
          window.location.reload();
        });
        document.getElementById('clear-cancel').addEventListener('click', () => { navigate('/settings'); });
      });
    }

    // ========== Init ==========
    async function init() {
      await openDB();
      await seedDatabase();
      await migrateLegacyCaseValues();
      // 要求持久儲存，避免瀏覽器在空間不足時清除 IndexedDB（含 PDF）
      if (navigator.storage?.persist) navigator.storage.persist();
      handleRoute();
    }

    // Expose navigate globally
    window.navigate = navigate;

    // Handle back/forward and manual hash edits
    window.addEventListener('hashchange', handleRoute);

    // Expose PDF function（page 有值時直接跳頁）
    window.openPdf = async (key, page) => {
      // 先在使用者手勢內同步開窗，await 之後才 window.open 會被 iOS 擋下
      const win = window.open('', '_blank');
      try {
        const blob = await getPdfBlob(key);
        if (!blob) throw new Error('找不到 PDF 檔案');
        const url = URL.createObjectURL(blob) + (page ? '#page=' + page : '');
        if (win) { win.location = url; } else { window.location.href = url; }
        setTimeout(() => URL.revokeObjectURL(url.split('#')[0]), 60000);
      } catch (e) {
        if (win) win.close();
        showToast(e.message);
      }
    };

    // ========== 全域小操作（勾選、精準欄位、版本確認） ==========
    // checklist 勾選：就地更新樣式，不重新渲染整頁
    window._toggleCheck = async (id, checked, el) => {
      const item = await dbGet('checklists', id);
      if (!item) return;
      await dbPut('checklists', { ...item, checked });
      const p = el?.closest('label')?.querySelector('p');
      if (p) { p.style.textDecoration = checked ? 'line-through' : ''; p.style.color = checked ? 'var(--gray-400)' : ''; }
    };
    window._resetChecks = async (cancerId) => {
      const items = (await dbGetAll('checklists')).filter(c => c.cancerId === cancerId && c.checked);
      for (const it of items) await dbPut('checklists', { ...it, checked: false });
      showToast('已重設勾選');
      handleRoute({ preserveScroll: true });
    };
    window._newCase = async (cancerId) => {
      if (!confirm('清除這個癌別目前輸入的病患條件、勾選項目與已選藥物？')) return;
      window.CASE_STATE.clear(cancerId);
      const checks = (await dbGetAll('checklists')).filter(item => item.cancerId === cancerId && item.checked);
      for (const item of checks) await dbPut('checklists', { ...item, checked: false });
      clearNhiQueryState(cancerId);
      sessionStorage.removeItem(nhiTreatmentSessionKey(cancerId));
      showToast('已清空，可開始新個案');
      handleRoute({ preserveScroll: true });
    };
    // 精準欄位填值（單選／文字／數字）；改值後重繪，讓條件連動即時反映
    window._setPfValue = async (id, value, el) => {
      const anchorId = 'precision-field-' + id;
      const anchorTop = el?.closest('.form-group')?.getBoundingClientRect().top;
      const f = await dbGet('precisionFields', id);
      if (f) {
        window.CASE_STATE.setValue(f.cancerId, id, value);
        clearNhiQueryState(f.cancerId);
        await handleRoute({ preserveScroll: true, anchorId, anchorTop });
      }
    };
    // 精準欄位多選：以選項 index 切換，避免特殊字元進到 onclick
    window._togglePfMulti = async (id, optIdx) => {
      const anchorId = 'precision-field-' + id;
      const anchorTop = document.getElementById(anchorId)?.getBoundingClientRect().top;
      const f = await dbGet('precisionFields', id);
      if (!f) return;
      const opt = f.options[optIdx];
      const currentValues = window.CASE_STATE.read(f.cancerId);
      const cur = Array.isArray(currentValues[id]) ? [...currentValues[id]] : [];
      const i = cur.indexOf(opt);
      if (i >= 0) cur.splice(i, 1); else cur.push(opt);
      window.CASE_STATE.setValue(f.cancerId, id, cur);
      clearNhiQueryState(f.cancerId);
      await handleRoute({ preserveScroll: true, anchorId, anchorTop });
    };
    // 指引版本確認為最新
    window._verifyDoc = async (id) => {
      const d = await dbGet('documents', id);
      if (!d) return;
      await dbPut('documents', { ...d, verifiedAt: new Date().toISOString().split('T')[0] });
      showToast('已確認為最新版本');
      handleRoute({ preserveScroll: true });
    };

    init();

    // Register Service Worker and make updates explicit on installed PWAs.
    if ('serviceWorker' in navigator) {
      let applyingAppUpdate = false;
      const showAppUpdate = (registration) => {
        const banner = document.getElementById('app-update-banner');
        const button = document.getElementById('app-update-btn');
        if (!banner || !button) return;
        banner.classList.remove('hidden');
        button.onclick = () => {
          applyingAppUpdate = true;
          if (registration.waiting) registration.waiting.postMessage({ type: 'SKIP_WAITING' });
          else window.location.reload();
        };
      };
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (applyingAppUpdate) window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then((registration) => {
          console.log('SW registered:', registration.scope || 'disabled');
          if (registration.waiting) showAppUpdate(registration);
          registration.addEventListener('updatefound', () => {
            const worker = registration.installing;
            worker?.addEventListener('statechange', () => {
              if (worker.state === 'installed' && navigator.serviceWorker.controller) showAppUpdate(registration);
            });
          });
          registration.update().catch(() => {});
        }).catch((err) => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
