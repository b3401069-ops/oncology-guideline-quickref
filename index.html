    body {

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gray-800); color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 14px; z-index: 9999; animation: toast-in 0.3s ease; }

<body>
  <div id="app"></div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="./clinical-templates.js"></script>
  <script type="module">
    // ========== Database ==========
    const DB_NAME = 'OncologyGuidelineDB';
    const DB_VERSION = 1;
    let db;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('cancerCards')) {
            const store = db.createObjectStore('cancerCards', { keyPath: 'id' });
            store.createIndex('category', 'category');
            store.createIndex('zhName', 'zhName');
          }
          if (!db.objectStoreNames.contains('documents')) {
            const store = db.createObjectStore('documents', { keyPath: 'id' });
            store.createIndex('cancerIds', 'cancerIds', { multiEntry: true });
          }
          if (!db.objectStoreNames.contains('checklists')) {
            const store = db.createObjectStore('checklists', { keyPath: 'id' });
            store.createIndex('cancerId', 'cancerId');
          }
          if (!db.objectStoreNames.contains('precisionFields')) {
            const store = db.createObjectStore('precisionFields', { keyPath: 'id' });
            store.createIndex('cancerId', 'cancerId');
          }
          if (!db.objectStoreNames.contains('nhiNotes')) {
            const store = db.createObjectStore('nhiNotes', { keyPath: 'id' });
            store.createIndex('cancerId', 'cancerId');
          }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(db); };
        req.onerror = (e) => reject(e.target.error);
      });
    }

    // PDF storage (separate DB for large files)
    function openPdfDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('OncologyPdfStorage', 1);
        req.onupgradeneeded = (e) => {
          e.target.result.createObjectStore('pdfs');
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e.target.error);
      });
    }

    function dbGetAll(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbGet(storeName, id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).get(id);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbPut(storeName, data) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).put(data);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    function dbPutMany(storeName, items) {
      if (!items.length) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        for (const item of items) store.put(item);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error || new Error('批次寫入已中止'));
      });
    }

    function dbDelete(storeName, id) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).delete(id);
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    function dbClear(storeName) {
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const req = tx.objectStore(storeName).clear();
        req.onsuccess = () => resolve();
        req.onerror = () => reject(req.error);
      });
    }

    // ========== Seed Data ==========

    const parseSection = (s) => {
      const parts = String(s).split('|').map(x => x.trim());
      const out = { name: parts[0] || '', page: null, cond: null, raw: s };
      for (const p of parts.slice(1)) {
        if (/^[pP]?\.?\s*\d+$/.test(p)) out.page = Number(p.replace(/\D/g, ''));
        else if (p.includes('=')) out.cond = parseCondStr(p);
      }
      return out;
    };
    // 條件字串「欄位=值1/值2」→ { field, values }
    const parseCondStr = (str) => {
      const i = str.indexOf('=');
      if (i < 0) return null;
      const field = str.slice(0, i).trim();
      const values = str.slice(i + 1).split(/[\/、,]/).map(v => v.trim()).filter(Boolean);
      return field && values.length ? { field, values } : null;
    };
    const condLabel = (cond) => cond && cond.values?.length ? `${cond.field}=${cond.values.join('/')}` : '';
    // 由精準欄位建 值對照表；條件狀態：null=無條件(一律顯示)、'met'=符合、'unmet'=不符合
    const buildPfMap = (fields) => { const m = {}; fields.forEach(f => { m[f.label] = Array.isArray(f.value) ? f.value : (hasPfValue(f) ? [String(f.value)] : []); }); return m; };
    const condState = (cond, pfMap) => {
      if (!cond || !cond.values?.length) return null;
      const cur = pfMap[cond.field] || [];
      return cond.values.some(v => cur.includes(v)) ? 'met' : 'unmet';
    };
    // 依條件狀態排序：符合 → 無條件 → 不符合
    const condRank = (st) => st === 'met' ? 0 : st === null ? 1 : 2;

    const NHI_STATUS_RELATED = 'related_with_restrictions';
    const NHI_STATUS_VERIFY = 'verification_needed';
    const nhiCoverageStatus = (note) => note?.coverageStatus === NHI_STATUS_RELATED ? NHI_STATUS_RELATED : NHI_STATUS_VERIFY;
    const nhiConditionState = (cond, pfMap) => {
      if (!cond || !cond.values?.length) return 'review';
      const current = pfMap[cond.field] || [];
      if (!current.length) return 'unknown';
      return cond.values.some(value => current.includes(value)) ? 'matched' : 'unmatched';
    };
    const nhiConditionRank = (state) => ({ matched: 0, unknown: 1, review: 2, unmatched: 3 }[state] ?? 4);
    const nhiConditionStateText = (state, cond) => {
      if (state === 'matched') return '目前資料可能符合已設定條件';
      if (state === 'unknown') return `資料不足：尚未填寫 ${cond?.field || '條件欄位'}`;
      if (state === 'unmatched') return '目前資料未符合這一條限制';
      return '需逐項人工核對限制條件';
    };
    const splitNhiRestrictions = (content) => String(content || '')
      .split(/\r?\n|[；;]/)
      .map(item => item.trim().replace(/^[-•]\s*/, ''))
      .filter(Boolean);
    const renderNhiRestrictions = (content) => {
      const restrictions = splitNhiRestrictions(content);
      if (!restrictions.length) return '<p class="text-sm text-gray-400 mt-2">尚未列出限制條件</p>';
      return `<ul class="text-sm text-blue-700 mt-2 space-y-1" style="padding-left:18px;list-style:disc">${restrictions.map(item => `<li>${esc(item)}</li>`).join('')}</ul>`;
    };
    const renderNhiStateTag = (state, cond) => {
      const text = esc(nhiConditionStateText(state, cond));
      if (state === 'matched') return `<span class="tag tag-category">${text}</span>`;
      if (state === 'unknown') return `<span class="tag" style="background:var(--amber-50);color:var(--amber-800)">${text}</span>`;
      return `<span class="tag">${text}</span>`;
    };
    const renderNhiSummary = (notes) => {
      const hasRelated = notes.some(note => nhiCoverageStatus(note) === NHI_STATUS_RELATED);
      const title = hasRelated ? '健保有相關給付，但有限制條件' : '已建立健保查核資料，尚待確認是否有相關給付';
      const detail = hasRelated
        ? '請逐項核對適應症、病期、治療線別、生物標記、先前治療及事前審查；這裡不代表已通過給付資格審查。'
        : '目前資料不足，不能推論為沒有給付；請連結最新版健保規定並完成限制條件。';
      return `<div class="alert ${hasRelated ? 'alert-info' : 'alert-warning'} mb-3"><p class="font-semibold">${title}</p><p class="text-xs mt-1">${detail}</p></div>`;
    };
    const renderNhiNoteCard = (note, state, linked, heading = note.label) => `
      <div class="bg-blue-50 rounded-lg p-3" style="${state === 'matched' ? 'outline:2px solid var(--primary-400)' : ''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
          <p class="text-sm font-medium text-blue-800">${esc(heading)}</p>
          ${renderNhiStateTag(state, note.condition)}
        </div>
        ${renderNhiRestrictions(note.content)}
        ${note.condition ? `<p class="text-xs text-gray-500 mt-2">對應欄位：${esc(condLabel(note.condition))}</p>` : ''}
        ${linked?.storageKey ? `<button class="text-sm text-blue-700 mt-2" style="font-weight:500" onclick="openPdf('${linked.storageKey}')">📄 開啟給付規定 PDF</button>` : ''}
      </div>`;
    const normalizeNhiTreatmentName = (value) => String(value || '')
      .normalize('NFKC').trim().toLowerCase().replace(/\s+/g, ' ');
    const groupNhiTreatments = (entries) => {
      const groups = new Map();
      entries.forEach((entry) => {
        const label = String(entry.n.label || '').trim() || '未命名藥物／療程';
        const key = normalizeNhiTreatmentName(label);
        if (!groups.has(key)) groups.set(key, { key, label, entries: [] });
        groups.get(key).entries.push(entry);
      });
      return [...groups.values()];
    };
    const nhiTreatmentSessionKey = (cancerId) => `nhi-treatment:${cancerId}`;

    // 指引過期判斷：以最後確認日（無則匯入日）起算
    const STALE_DAYS = 180;
    const docAgeDays = (d) => Math.floor((Date.now() - new Date(d.verifiedAt || d.importedAt || Date.now())) / 86400000);
    const isStaleDoc = (d) => d.current && !d.archived && docAgeDays(d) > STALE_DAYS;
    // 精準欄位是否已填值
    const hasPfValue = (f) => Array.isArray(f.value) ? f.value.length > 0 : !!(f.value && String(f.value).trim());
    const pfValueText = (f) => Array.isArray(f.value) ? f.value.join('、') : (f.value || '');

    // ========== 適用條件選擇器（編輯表單共用） ==========
    // selFields：此癌別的單選/多選精準欄位
    const condPickerHTML = (selFields, existing, mode = 'visibility') => {
      if (!selFields.length) return `<div class="form-group"><label class="label">適用條件</label><p class="text-xs text-gray-400">尚無可用精準欄位。先到「編輯精準欄位」建立單選/多選欄位，才能設定條件。</p></div>`;
      const conditionHelp = mode === 'nhi'
        ? '對應條件（可不設；用來標示可能符合、資料不足或未符合這一條，不會隱藏健保提醒）'
        : '適用條件（可不設；符合時提醒會優先浮出）';
      return `<div class="form-group"><label class="label">${conditionHelp}</label>
        <select class="input" id="cond-field">
          <option value="">— 無條件（一律顯示）—</option>

        </select>
        <div id="cond-values" class="mt-2"></div></div>`;
    };
    const wireCondPicker = (selFields, existing) => {
      const fieldEl = document.getElementById('cond-field');
      const valWrap = document.getElementById('cond-values');
      if (!fieldEl || !valWrap) return;
      const renderVals = () => {
        const f = selFields.find(x => x.label === fieldEl.value);
        if (!f) { valWrap.innerHTML = ''; return; }
        valWrap.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:6px">${f.options.map(o => {
          const on = existing?.field === f.label && existing.values?.includes(o);
          return `<label class="checkbox-wrap" style="padding:4px 8px"><input type="checkbox" class="cond-val" value="${esc(o)}" ${on ? 'checked' : ''}> <span class="text-sm">${esc(o)}</span></label>`;
        }).join('')}</div>`;
      };
      fieldEl.addEventListener('change', renderVals);
      renderVals();
    };
    const readCond = () => {
      const fieldEl = document.getElementById('cond-field');
      if (!fieldEl || !fieldEl.value) return null;
      const values = [...document.querySelectorAll('.cond-val:checked')].map(c => c.value);
      return values.length ? { field: fieldEl.value, values } : null;
    };

    async function seedDatabase() {
      const cardsById = new Map((await dbGetAll('cancerCards')).map(card => [card.id, card]));
      const today = new Date().toISOString().split('T')[0];
      for (const [category, cancers] of Object.entries(CATEGORIES)) {
        for (const c of cancers) {
          const id = c.id || ID_MAP[c.zh];
          if (cardsById.has(id)) continue;
          await dbPut('cancerCards', {
            id,
            category,
            zhName: c.zh,
            enName: c.en,
            synonyms: c.syn,
            primaryGuideline: '',
            secondaryGuidelines: [],
            documentIds: [],
            mustReadSections: [],
            checklistIds: [],
            precisionFieldIds: [],
            nhiNoteIds: [],
            externalLinks: [],
            reviewStatus: '待維護',
            updatedAt: today,
          });
          cardsById.set(id, await dbGet('cancerCards', id));
        }
      }

      for (const guideline of NCCN_GUIDELINES) {
        const card = cardsById.get(guideline.cardId);
        if (!card) throw new Error('NCCN card template not found: ' + guideline.cardId);
        const currentLinks = card.nccnGuidelines || [];
        if (currentLinks.some(item => item.id === guideline.id)) continue;
        const updatedCard = {
          ...card,
          nccnGuidelines: [...currentLinks, { id: guideline.id, title: guideline.title, url: guideline.url }],
        };
        await dbPut('cancerCards', updatedCard);
        cardsById.set(card.id, updatedCard);
      }

      const normalizeClinicalLabel = (value) => String(value || '').trim().toLocaleLowerCase().replace(/\s+/g, ' ');
      const checklistByCancer = new Map();
      const precisionByCancer = new Map();
      for (const item of await dbGetAll('checklists')) {
        if (!checklistByCancer.has(item.cancerId)) checklistByCancer.set(item.cancerId, []);
        checklistByCancer.get(item.cancerId).push(item);
      }
      for (const item of await dbGetAll('precisionFields')) {
        if (!precisionByCancer.has(item.cancerId)) precisionByCancer.set(item.cancerId, []);
        precisionByCancer.get(item.cancerId).push(item);
      }

      const pendingClinicalChecklists = [];
      const pendingClinicalPrecision = [];
      const pendingClinicalCards = [];

      for (const [cancerId, card] of cardsById) {
        if (Number(card.clinicalTemplateVersion || 0) >= CLINICAL_TEMPLATE_VERSION) continue;
        const offeredKeys = new Set(card.clinicalTemplateKeys || []);
        const checklistLabels = new Set((checklistByCancer.get(cancerId) || []).map(item => normalizeClinicalLabel(item.label)));
        const precisionLabels = new Set((precisionByCancer.get(cancerId) || []).map(item => normalizeClinicalLabel(item.label)));

        for (const template of checklistTemplatesForCancer(cancerId)) {
          const offeredKey = 'checklist:' + template.key;
          if (offeredKeys.has(offeredKey)) continue;
          const knownLabels = [template.label, ...(template.aliases || [])].map(normalizeClinicalLabel);
          if (!knownLabels.some(label => checklistLabels.has(label))) {
            pendingClinicalChecklists.push({
              id: 'clinical-cl:' + cancerId + ':' + template.key,
              cancerId,
              label: template.label,
              category: template.category,
              importance: template.importance,
              condition: null,
              checked: false,
              sourceType: '內建癌別範本',
              sourceDocumentId: '',
              sourceTemplateKey: template.key,
              templateScope: template.scope,
              updatedAt: today,
            });
            checklistLabels.add(normalizeClinicalLabel(template.label));
          }
          offeredKeys.add(offeredKey);
        }

        for (const template of precisionTemplatesForCancer(cancerId)) {
          const offeredKey = 'precision:' + template.key;
          if (offeredKeys.has(offeredKey)) continue;
          const knownLabels = [template.label, ...(template.aliases || [])].map(normalizeClinicalLabel);
          if (!knownLabels.some(label => precisionLabels.has(label))) {
            pendingClinicalPrecision.push({
              id: 'clinical-pf:' + cancerId + ':' + template.key,
              cancerId,
              label: template.label,
              type: template.type,
              required: false,
              options: [...template.options],
              sourceType: '內建癌別範本',
              sourceTemplateKey: template.key,
              templateScope: template.scope,
            });
            precisionLabels.add(normalizeClinicalLabel(template.label));
          }
          offeredKeys.add(offeredKey);
        }

        const updatedCard = {
          ...card,
          clinicalTemplateVersion: CLINICAL_TEMPLATE_VERSION,
          clinicalTemplateKeys: [...offeredKeys],
          clinicalTemplateSeededAt: today,
        };
        pendingClinicalCards.push(updatedCard);
        cardsById.set(cancerId, updatedCard);
      }

      await Promise.all([
        dbPutMany('checklists', pendingClinicalChecklists),
        dbPutMany('precisionFields', pendingClinicalPrecision),
        dbPutMany('cancerCards', pendingClinicalCards),
      ]);
    }

    // ========== PDF Helpers ==========
    async function storePdf(file) {
      const pdfDb = await openPdfDB();
      const key = 'pdf-' + crypto.randomUUID();
      const buf = await file.arrayBuffer();
      return new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').put(buf, key);
        tx.oncomplete = () => { pdfDb.close(); resolve(key); };
        tx.onerror = () => { pdfDb.close(); reject(new Error('無法儲存 PDF')); };
      });
    }

    async function getPdfBlob(key) {
      const pdfDb = await openPdfDB();
      return new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readonly');
        const req = tx.objectStore('pdfs').get(key);
        req.onsuccess = () => {
          pdfDb.close();
          resolve(req.result ? new Blob([req.result], { type: 'application/pdf' }) : null);
        };
        req.onerror = () => { pdfDb.close(); reject(new Error('無法讀取 PDF')); };
      });
    }

    async function deletePdf(key) {
      const pdfDb = await openPdfDB();
      return new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').delete(key);
        tx.oncomplete = () => { pdfDb.close(); resolve(); };
        tx.onerror = () => { pdfDb.close(); reject(new Error('無法刪除 PDF')); };
      });
    }


    function putPdfBuffer(key, buf) {
      return openPdfDB().then(pdfDb => new Promise((resolve, reject) => {
        const tx = pdfDb.transaction('pdfs', 'readwrite');
        tx.objectStore('pdfs').put(buf, key);
        tx.oncomplete = () => { pdfDb.close(); resolve(); };
        tx.onerror = () => { pdfDb.close(); reject(new Error('無法儲存 PDF')); };
      }));
    }

    function bufferToDataUrl(buf) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('PDF 轉換失敗'));
        reader.readAsDataURL(new Blob([buf], { type: 'application/pdf' }));
      });
    }

    // ========== Backup ==========
    const BACKUP_STORES = ['cancerCards','documents','checklists','precisionFields','nhiNotes'];

    async function exportBackup(includePdfs) {
      const [cancerCards, documents, checklists, precisionFields, nhiNotes] = await Promise.all([
        dbGetAll('cancerCards'), dbGetAll('documents'), dbGetAll('checklists'),
        dbGetAll('precisionFields'), dbGetAll('nhiNotes')
      ]);
      if (!includePdfs) {
        return {
          version: 1, exportedAt: new Date().toISOString(),
          cancerCards,
          documents: documents.map(d => ({ ...d, storageKey: null })),
          checklists, precisionFields, nhiNotes
        };
      }
      const pdfs = [];
      for (const d of documents) {
        if (!d.storageKey) continue;
        const blob = await getPdfBlob(d.storageKey);
        if (blob) pdfs.push({ key: d.storageKey, data: await bufferToDataUrl(await blob.arrayBuffer()) });
      }
      return {
        version: 2, exportedAt: new Date().toISOString(),
        cancerCards, documents, checklists, precisionFields, nhiNotes, pdfs
      };
    }

    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function importBackup(file) {
      const text = await file.text();
      const data = JSON.parse(text);
      if (data.version !== 1 && data.version !== 2) throw new Error('備份格式不相容');
      // 先驗證整包資料再清空，避免匯入到一半失敗造成資料全毀
      for (const store of BACKUP_STORES) {
        const items = data[store] || [];
        if (!Array.isArray(items)) throw new Error('備份格式錯誤：' + store);
        for (const item of items) {
          if (!item || typeof item.id !== 'string' || !item.id) throw new Error('備份格式錯誤：' + store + ' 有項目缺少 id');
        }
      }
      const pdfs = Array.isArray(data.pdfs) ? data.pdfs.filter(p => p?.key && typeof p.data === 'string') : [];
      const pdfBuffers = [];
      for (const p of pdfs) {
        pdfBuffers.push({ key: p.key, buf: await (await fetch(p.data)).arrayBuffer() });
      }
      for (const store of BACKUP_STORES) {
        await dbClear(store);
        for (const item of data[store] || []) await dbPut(store, item);
      }
      for (const p of pdfBuffers) await putPdfBuffer(p.key, p.buf);
    }

    // ========== Search ==========
    function searchCards(cards, query) {
      if (!query.trim()) return cards;
      const q = query.toLowerCase().trim();
      return cards.filter(c =>
        c.zhName.toLowerCase().includes(q) ||
        c.enName.toLowerCase().includes(q) ||
        c.id.toLowerCase().includes(q) ||
        c.synonyms.some(s => s.toLowerCase().includes(q)) ||
        c.category.toLowerCase().includes(q) ||
        (c.nccnGuidelines || []).some(g => g.title.toLowerCase().includes(q))
      );
    }

    // ========== Filename Guessing (batch import) ==========
    const SOURCE_PATTERNS = [
      ['NCCN', /nccn/i], ['ESMO', /esmo/i], ['ASCO', /asco/i], ['NICE', /nice/i],
      ['JSCO', /jsco/i], ['TCOG', /tcog/i], ['AJCC', /ajcc/i], ['WHO', /\bwho\b/i],
      ['健保', /健保|nhi/i],
    ];
    // 常見指引檔名縮寫 → 癌別 id（synonyms 沒涵蓋的）
    const FILENAME_HINTS = { nscl: 'nsclc' };
    const NAME_STOPWORDS = new Set(['cancer','cancers','carcinoma','tumor','tumors','tumour','cell','cells','of','and','the','disease','neoplasm','neoplasms','syndrome','syndromes']);

    function guessSource(name) {
      for (const [label, re] of SOURCE_PATTERNS) if (re.test(name)) return label;
      return '';
    }

    function guessVersion(name) {
      let m = name.match(/(20\d{2})[ ._-]*[vV](\d+)/);
      if (m) return m[1] + '.V' + m[2];
      m = name.match(/[vV](\d+)[ ._-]*(20\d{2})/);
      if (m) return m[2] + '.V' + m[1];
      m = name.match(/20\d{2}/);
      return m ? m[0] : '';
    }

    function guessCancer(filename, cards) {
      const norm = filename.toLowerCase().replace(/\.pdf$/i, '').replace(/[_\-.+()\[\]]+/g, ' ');
      const tokens = new Set(norm.split(/\s+/).filter(Boolean));
      for (const [hint, id] of Object.entries(FILENAME_HINTS)) {
        if (tokens.has(hint)) { const c = cards.find(c => c.id === id); if (c) return c; }
      }
      let best = null, bestScore = 0;
      for (const c of cards) {
        let score = 0;
        if (c.zhName && filename.includes(c.zhName)) score = 5 + Math.min(c.zhName.length, 80) / 1000;
        for (const n of [c.enName, ...(c.synonyms || []), ...(c.nccnGuidelines || []).map(g => g.title)]) {
          if (!n) continue;
          if (/[一-鿿]/.test(n)) {
            if (filename.includes(n)) score = Math.max(score, 5 + Math.min(n.length, 80) / 1000);
            continue;
          }
          const ln = n.toLowerCase();
          const specificityBonus = Math.min(ln.length, 80) / 1000;
          if (!ln.includes(' ') && /^[a-z0-9]{2,6}$/.test(ln)) {
            // 縮寫要求整個 token 完全一致，避免 mm/hl 之類誤中
            if (tokens.has(ln)) score = Math.max(score, ln.length >= 3 ? 3 : 2);
          } else if (norm.includes(ln)) {
            score = Math.max(score, 4 + specificityBonus);
          } else {
            const words = ln.split(/\s+/).filter(w => !NAME_STOPWORDS.has(w));
            if (words.length && words.every(w => tokens.has(w))) score = Math.max(score, 4 + specificityBonus);
          }
        }
        if (score > bestScore) { bestScore = score; best = c; }
      }
      return bestScore >= 2 ? best : null;
    }

    // ========== HTML Escape ==========
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => (
        { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
      ));
    }

    // ========== Toast ==========
    function showToast(msg, duration = 2500) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), duration);
    }

    // ========== Router ==========
    // Hash-based：GitHub Pages 專案子路徑沒有 SPA fallback，
    // history.pushState 的路徑重新整理會 404
    let currentRoute = '/';
    let routeParams = {};

    function getHashPath() {
      const h = window.location.hash;
      return h.length > 1 ? h.slice(1) : '/';
    }

    function parseRoute(path) {
      currentRoute = path || '/';
      routeParams = {};
      const parts = currentRoute.split('/').filter(Boolean);
      if (parts[0] === 'cancer' && parts[1]) {
        routeParams.cancerId = parts[1];
        routeParams.sub = parts[2] || '';
      } else if (parts[0] === 'pdf-library' && parts[1] === 'import') {
        routeParams.docId = parts[2] || '';
      }
    }

    function handleRoute() {
      parseRoute(getHashPath());
      render();
      window.scrollTo(0, 0);
    }

    function navigate(path) {
      if (getHashPath() === path) { handleRoute(); return; }
      window.location.hash = path;
    }

    // ========== Render Engine ==========
    async function render() {
      const app = document.getElementById('app');
      if (currentRoute === '/') {
        await renderHomePage(app);
      } else if (currentRoute.startsWith('/cancer/') && !routeParams.sub) {
        await renderCancerDetail(app);
      } else if (routeParams.sub === 'quickref') {
        await renderQuickRef(app);
      } else if (routeParams.sub === 'edit') {
        await renderEditCancer(app);
      } else if (routeParams.sub === 'checklist') {
        await renderChecklist(app);
      } else if (routeParams.sub === 'precision') {
        await renderPrecision(app);
      } else if (routeParams.sub === 'nhi') {
        await renderNhi(app);
      } else if (currentRoute === '/sources') {
        await renderSourceHub(app);
      } else if (currentRoute === '/pdf-library' && !routeParams.docId) {
        await renderPdfLibrary(app);
      } else if (currentRoute === '/pdf-library/batch') {
        await renderBatchImport(app);

        await renderSettings(app);

    async function renderHomePage(app) {
      const cards = await dbGetAll('cancerCards');
      const pending = cards.filter(c => c.reviewStatus === '待維護').length;
      const docs = await dbGetAll('documents');
      const staleCount = docs.filter(isStaleDoc).length;
      // 備份提醒：有匯入文件才提醒（代表已有實際資料）
      const lastBackupAt = localStorage.getItem('lastBackupAt');
      const backupDays = lastBackupAt ? Math.floor((Date.now() - new Date(lastBackupAt)) / 86400000) : null;
      const needBackup = docs.length > 0 && (backupDays === null || backupDays > 14);
      // 最近使用（前 5 筆）
      const recent = cards.filter(c => c.lastUsedAt).sort((a, b) => b.lastUsedAt.localeCompare(a.lastUsedAt)).slice(0, 5);

      app.innerHTML = `
        <div class="container">
          <div class="mb-6">
            <h1 class="text-2xl font-bold">腫瘤指引快速查</h1>
            <p class="text-sm text-gray-500 mt-1">個人本機指引查閱與防漏工具</p>
          </div>
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" class="input" style="padding-left:44px;padding-right:40px"
              placeholder="搜尋癌別、英文名或同義詞..." />
            <button id="search-clear" class="search-clear hidden">✕</button>
          </div>
          ${pending > 0 ? `<div class="alert alert-warning">⚠️ 有 <strong>${pending}</strong> 個癌別待維護</div>` : ''}
          ${staleCount > 0 ? `<div class="alert alert-warning" style="cursor:pointer" onclick="navigate('/pdf-library')">⏰ 有 <strong>${staleCount}</strong> 份指引超過 6 個月未確認版本，點此前往文件庫</div>` : ''}
          ${needBackup ? `<div class="alert alert-info" style="cursor:pointer" onclick="navigate('/settings')">💾 ${backupDays === null ? '尚未匯出過備份' : '已 ' + backupDays + ' 天未備份'}，點此前往設定頁備份</div>` : ''}
          <div id="search-results" class="hidden"></div>
          <div id="home-content">
            ${recent.length ? `<div class="category-title">🕐 最近使用</div>${recent.map(c => renderCancerCardItem(c)).join('')}<div style="height:12px"></div>` : ''}
            <div class="quick-links">
              <div class="quick-link" onclick="navigate('/pdf-library')">
                <span class="quick-link-icon">📄</span>
                <span class="quick-link-label">PDF 文件庫</span>
              </div>
              <div class="quick-link" onclick="navigate('/sources')">
                <span class="quick-link-icon">🌐</span>
                <span class="quick-link-label">來源中心</span>
              </div>
              <div class="quick-link" onclick="navigate('/settings')">
                <span class="quick-link-icon">⚙️</span>
                <span class="quick-link-label">設定</span>
              </div>
            </div>
            <div id="category-list"></div>
          </div>
          ${renderNav('search')}
        </div>
      `;

      // Render categories
      const grouped = {};
      cards.forEach(c => { if (!grouped[c.category]) grouped[c.category] = []; grouped[c.category].push(c); });
      const catEl = document.getElementById('category-list');
      catEl.innerHTML = Object.entries(grouped).map(([cat, items]) => `
        <div class="category-title">${esc(cat)}</div>
        ${items.map(c => renderCancerCardItem(c)).join('')}
      `).join('');

      // Search
      const input = document.getElementById('search-input');
      const clearBtn = document.getElementById('search-clear');
      const resultsEl = document.getElementById('search-results');
      const homeEl = document.getElementById('home-content');

      input.addEventListener('input', () => {
        const q = input.value;
        clearBtn.classList.toggle('hidden', !q);
        if (q.trim()) {
          const filtered = searchCards(cards, q);
          homeEl.classList.add('hidden');
          resultsEl.classList.remove('hidden');
          resultsEl.innerHTML = `
            <p class="text-sm text-gray-500 mb-3">找到 ${filtered.length} 個結果</p>
            ${filtered.length === 0 ? '<div class="card text-center" style="padding:32px"><p class="text-gray-400">找不到符合的癌別</p></div>' :
              filtered.map(c => renderCancerCardItem(c)).join('')}
          `;
        } else {

          resultsEl.classList.add('hidden');
        }
      });
      clearBtn.addEventListener('click', () => { input.value = ''; input.dispatchEvent(new Event('input')); });

            ${filledPf.flatMap(f => (Array.isArray(f.value) ? f.value : [f.value]).map(v => `<span class="tag tag-category">${esc(v)}</span>`)).join('')}

          <div class="card section">
            <h2 class="section-title">📖 必查章節</h2>
            ${secVisible.length ? `<ul class="space-y-2">${secVisible.map(({ ps, st }) => {
              const jump = ps.page && jumpDoc ? `<button class="text-sm" style="margin-left:auto;color:var(--primary-600);font-weight:500;white-space:nowrap" onclick="openPdf('${jumpDoc.storageKey}', ${ps.page})">p.${ps.page} →</button>` :
                ps.page ? `<span class="text-xs text-gray-400" style="margin-left:auto">p.${ps.page}</span>` : '';
              const mark = st === 'met' ? '<span class="tag tag-category" style="margin-left:6px">✦</span>' : '';
              return `<li class="list-item"><span class="list-dot">•</span><span class="text-sm text-gray-700">${esc(ps.name)}</span>${mark}${jump}</li>`;
            }).join('')}</ul>${secHidden ? `<p class="text-xs text-gray-400 mt-2">另有 ${secHidden} 項情境相關章節未符合目前輸入</p>` : ''}` :
              (card.mustReadSections.length ? `<p class="text-sm text-gray-400">目前情境無對應章節（共 ${secHidden} 項情境相關）</p>` : '<p class="text-sm text-gray-400">尚未設定</p>')}
          </div>

          <div class="card section">
            <div class="flex-between">
              <h2 class="section-title">✅ 不要漏</h2>
              ${clVisible.some(x => x.c.checked) ? `<button class="btn btn-ghost btn-sm" style="width:auto;padding:4px 10px" onclick="window._resetChecks('${card.id}')">重設勾選</button>` : ''}
            </div>
            ${clVisible.length ? `<div class="space-y-2">${clVisible.map(({ c, st }) => `
              <label class="list-item" style="cursor:pointer;${st === 'met' ? 'background:var(--primary-50);border-radius:8px;padding-left:6px;padding-right:6px' : ''}">
                <input type="checkbox" ${c.checked ? 'checked' : ''} style="margin-top:2px" onchange="window._toggleCheck('${c.id}', this.checked, this)">
                <p class="text-sm text-gray-700" style="${c.checked ? 'text-decoration:line-through;color:var(--gray-400)' : ''}">${esc(c.label)}${st === 'met' ? ' <span class="tag tag-category">↳ 因 ' + esc(condLabel(c.condition)) + '</span>' : ''}</p>
              </label>
            `).join('')}</div>${clHidden ? `<p class="text-xs text-gray-400 mt-2">另有 ${clHidden} 項情境相關項目未符合目前輸入</p>` : ''}` :
              (checklists.length ? `<p class="text-sm text-gray-400">目前情境無對應項目（共 ${clHidden} 項情境相關）</p>` : '<p class="text-sm text-gray-400">尚未建立</p>')}
          </div>

          ${filledPf.length ? `
            <div class="card section">
              <h2 class="section-title">🎯 精準化資訊</h2>
              <div class="space-y-1">${filledPf.map(f => `<p class="text-sm text-gray-700">${esc(f.label)}：${esc(pfValueText(f))}</p>`).join('')}</div>
            </div>
          ` : ''}

          <div class="card section">
            <h2 class="section-title">💊 選擇藥物／療程查健保</h2>
            ${treatmentGroups.length ? `
              <div class="nhi-treatment-options" role="group" aria-label="藥物或療程">
                ${treatmentGroups.map(group => `<button type="button" class="nhi-treatment-option" data-nhi-treatment-key="${esc(group.key)}" aria-pressed="${group.key === selectedTreatment?.key}">${esc(group.label)}</button>`).join('')}
              </div>
              ${selectedTreatment ? `${renderNhiSummary(selectedTreatment.entries.map(({ n }) => n))}<div class="space-y-2">${selectedTreatment.entries.map(({ n, st }, index) => {
                const linked = docs.find(d => d.id === n.sourceDocumentId);
                const heading = selectedTreatment.entries.length > 1 ? `給付條件 ${index + 1}` : selectedTreatment.label;
                return renderNhiNoteCard(n, st, linked, heading);
              }).join('')}</div>` : '<div class="bg-gray-50 rounded p-3"><p class="text-sm text-gray-500">尚未選擇藥物／療程</p></div>'}
            ` : `<div class="bg-gray-50 rounded p-3"><p class="text-sm text-gray-500">尚未建立藥物／療程健保資料；這不代表沒有給付。</p><button class="btn btn-secondary btn-sm mt-3" onclick="navigate('/cancer/${card.id}/nhi')">新增藥物／療程</button></div>`}
          </div>

          ${missingItems.length ? `
            <div class="card section" style="border-color:var(--orange-200);background:var(--orange-50)">
              <h2 class="section-title" style="color:var(--orange-700)">⚠️ 目前資訊不足</h2>
              <ul class="space-y-1">${missingItems.map(m => `<li class="text-sm" style="color:var(--orange-700)">• ${m}</li>`).join('')}</ul>
            </div>
          ` : ''}

          <div class="card section" style="border-color:var(--primary-200);background:var(--primary-50)">
            <h2 class="section-title" style="color:var(--primary-800)">👉 下一步</h2>
            <ul class="space-y-2">
              ${hasDocs ? '<li class="text-sm" style="color:var(--primary-700)">✅ 已有本機指引，可直接開啟查閱</li>' : '<li class="text-sm" style="color:var(--primary-700)">• 先匯入本機 PDF 指引</li>'}
              ${card.mustReadSections.length ? '<li class="text-sm" style="color:var(--primary-700)">• 依必查章節逐項確認</li>' : ''}
              ${unfilledPf.length ? `<li class="text-sm" style="color:var(--primary-700)">• 若要更精準，回癌別頁補充：${esc(unfilledPf.map(f => f.label).join('、'))}</li>` : ''}
              ${checklists.length ? '<li class="text-sm" style="color:var(--primary-700)">• 依不要漏 checklist 逐項確認</li>' : ''}
            </ul>
          </div>

          <button class="btn btn-secondary" id="copy-quickref-btn">📋 複製為文字</button>

          <div class="text-xs text-gray-400 text-center mt-4 mb-8">
            <p>來源：${esc(card.primaryGuideline || '待維護')}</p>
            <p>更新日期：${esc(card.updatedAt)}</p>
            <p class="mt-2">此為快速參考，非最終治療建議</p>
          </div>
          ${renderNav('')}
        </div>
      `;

      app.querySelectorAll('[data-nhi-treatment-key]').forEach((button) => {
        button.addEventListener('click', () => {
          const key = nhiTreatmentSessionKey(card.id);
          const treatmentKey = button.dataset.nhiTreatmentKey;
          if (sessionStorage.getItem(key) === treatmentKey) sessionStorage.removeItem(key);
          else sessionStorage.setItem(key, treatmentKey);
          handleRoute();
        });
      });

      // 複製為文字（依計畫書第九節輸出格式）
      document.getElementById('copy-quickref-btn').addEventListener('click', async () => {
        const lines = ['快速參考：' + card.zhName, ''];
        lines.push('應查指引：');
        lines.push('- ' + (card.primaryGuideline || '待維護'));
        card.secondaryGuidelines.forEach(g => lines.push('- ' + g));
        lines.push('- 本機狀態：' + (hasDocs ? currentDocs.map(d => '已匯入 ' + (d.version || d.title)).join('、') : '尚未匯入'));
        if (filledPf.length) lines.push('- 目前情境：' + filledPf.map(f => pfValueText(f)).join('、'));
        if (secVisible.length) {
          lines.push('', '必查章節：');
          secVisible.forEach(({ ps, st }) => lines.push('- ' + ps.name + (ps.page ? '（p.' + ps.page + '）' : '') + (st === 'met' ? ' ✦' : '')));
          if (secHidden) lines.push('  （另有 ' + secHidden + ' 項情境相關章節未符合）');
        }
        if (clVisible.length) {
          lines.push('', '不要漏：');
          clVisible.forEach(({ c, st }) => lines.push('- [' + (c.checked ? 'x' : ' ') + '] ' + c.label + (st === 'met' ? '（↳ 因 ' + condLabel(c.condition) + '）' : '')));
          if (clHidden) lines.push('  （另有 ' + clHidden + ' 項情境相關項目未符合）');
        }
        if (filledPf.length) {
          lines.push('', '精準化資訊：');
          filledPf.forEach(f => lines.push('- ' + f.label + '：' + pfValueText(f)));
        }
        lines.push('', '健保給付：');
        if (selectedTreatment) {
          const selectedNotes = selectedTreatment.entries.map(({ n }) => n);
          const hasRelatedCoverage = selectedNotes.some(note => nhiCoverageStatus(note) === NHI_STATUS_RELATED);
          lines.push('- 已選擇：' + selectedTreatment.label);
          lines.push('- ' + (hasRelatedCoverage ? '健保有相關給付，但有限制條件' : '尚待確認是否有相關給付'));
          selectedTreatment.entries.forEach(({ n, st }, index) => {
            const ruleLabel = selectedTreatment.entries.length > 1 ? '給付條件 ' + (index + 1) : '給付條件';
            lines.push('- ' + ruleLabel + ' [' + nhiConditionStateText(st, n.condition) + ']');
            splitNhiRestrictions(n.content).forEach(item => lines.push('  • ' + item));
          });
        } else if (treatmentGroups.length) {
          lines.push('- 尚未選擇藥物／療程');
        } else {
          lines.push('- 尚未建立藥物／療程健保資料；這不代表沒有給付');
        }
        if (missingItems.length) {
          lines.push('', '目前資訊不足：');
          missingItems.forEach(m => lines.push('- ' + m));
        }
        lines.push('', '來源：' + (card.primaryGuideline || '待維護') + '｜更新日期：' + card.updatedAt);
        lines.push('此為快速參考，非最終治療建議');
        const text = lines.join('\n');
        try {
          await navigator.clipboard.writeText(text);
          showToast('已複製到剪貼簿');
        } catch {
          // 剪貼簿 API 不可用時的備援
          const ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          document.execCommand('copy'); ta.remove();
          showToast('已複製到剪貼簿');
        }
      });
    }

    async function renderEditCancer(app) {
      const card = await dbGet('cancerCards', routeParams.cancerId);
      if (!card) { navigate('/'); return; }

      app.innerHTML = `
        <div class="container">
          <button class="back-btn" onclick="navigate('/cancer/${card.id}')">← 返回</button>
          <h1 class="text-2xl font-bold mb-1">編輯癌別</h1>
          <p class="text-sm text-gray-500 mb-6">${esc(card.zhName)}</p>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">基本資料</h2>
            <div class="space-y-4">
              <div class="form-group"><label class="label">中文名稱</label><input class="input" id="edit-zh" value="${esc(card.zhName)}"></div>
              <div class="form-group"><label class="label">英文名稱</label><input class="input" id="edit-en" value="${esc(card.enName)}"></div>
              <div class="form-group"><label class="label">同義詞（用「、」分隔）</label><input class="input" id="edit-syn" value="${esc(card.synonyms.join('、'))}" placeholder="cholangiocarcinoma、gallbladder cancer"></div>
              <div class="form-group"><label class="label">審核狀態</label>
                <select class="input" id="edit-status">
                  <option value="待維護" ${card.reviewStatus==='待維護'?'selected':''}>待維護</option>
                  <option value="部分維護" ${card.reviewStatus==='部分維護'?'selected':''}>部分維護</option>
                  <option value="已維護" ${card.reviewStatus==='已維護'?'selected':''}>已維護</option>
                </select>
              </div>
            </div>
          </div>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">指引路由</h2>
            <div class="space-y-4">
              <div class="form-group"><label class="label">主要指引</label><input class="input" id="edit-primary" value="${esc(card.primaryGuideline)}" placeholder="NCCN Biliary Tract Cancers"></div>
              <div class="form-group"><label class="label">其他指引（每行一筆）</label><textarea class="input" id="edit-secondary" rows="3" placeholder="ESMO biliary tract cancer guidance">${esc(card.secondaryGuidelines.join('\n'))}</textarea></div>
            </div>
          </div>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">必查章節（每行一筆）</h2>
            <div id="section-presets" style="display:flex;flex-wrap:wrap;gap:6px" class="mb-2">
              ${PRESET_SECTIONS.map(s => `<button type="button" class="tag" style="cursor:pointer;border:none" data-section="${esc(s)}">+ ${esc(s)}</button>`).join('')}
              <button type="button" class="tag tag-category" style="cursor:pointer;border:none" data-section-all="1">＋ 全部加入</button>
            </div>
            <textarea class="input" id="edit-sections" rows="6" placeholder="初始評估&#10;分期與可切除性&#10;生物標記">${esc(card.mustReadSections.join('\n'))}</textarea>
            <p class="text-xs text-gray-400 mt-1">點上方常用章節快速加入，也可自行輸入或修改。可加頁碼「章節名稱|頁碼」（例：初始評估|12）一鍵跳頁；也可加適用條件「章節名稱|68|生物標記=FGFR2」，填入對應值時該章節會標示 ✦ 浮出</p>
          </div>

          <div class="card mb-4">
            <h2 class="font-semibold text-gray-800 mb-3">外部連結</h2>
            <textarea class="input" id="edit-links" rows="4" placeholder="NCCN指南|https://www.nccn.org">${esc(card.externalLinks.map(l => l.label+'|'+l.url).join('\n'))}</textarea>
            <p class="text-xs text-gray-400 mt-1">格式：標題|網址，每行一筆</p>
          </div>

          <button class="btn btn-primary" id="save-cancer-btn">儲存</button>
          ${renderNav('')}
        </div>
      `;

      // 常用章節快速加入（不重複）
      const addSections = (names) => {
        const ta = document.getElementById('edit-sections');
        const lines = ta.value.split('\n').map(s => s.trim()).filter(Boolean);
        for (const s of names) if (!lines.includes(s)) lines.push(s);
        ta.value = lines.join('\n');
      };
      document.querySelectorAll('#section-presets [data-section]').forEach(btn =>
        btn.addEventListener('click', () => addSections([btn.dataset.section])));
      document.querySelector('#section-presets [data-section-all]')?.addEventListener('click', () => addSections(PRESET_SECTIONS));

      document.getElementById('save-cancer-btn').addEventListener('click', async () => {
        const links = document.getElementById('edit-links').value.split('\n').filter(l => l.trim()).map(l => {
          const [label, url] = l.split('|');
          return { label: label?.trim() || '', url: url?.trim() || '' };
        }).filter(l => l.label && l.url);

        await dbPut('cancerCards', {
          ...card,
          zhName: document.getElementById('edit-zh').value.trim(),
          enName: document.getElementById('edit-en').value.trim(),
          synonyms: document.getElementById('edit-syn').value.split(/[、,]/).map(s => s.trim()).filter(Boolean),
          primaryGuideline: document.getElementById('edit-primary').value.trim(),
          secondaryGuidelines: document.getElementById('edit-secondary').value.split('\n').map(s => s.trim()).filter(Boolean),
          mustReadSections: document.getElementById('edit-sections').value.split('\n').map(s => s.trim()).filter(Boolean),
          externalLinks: links,
          reviewStatus: document.getElementById('edit-status').value,
          updatedAt: new Date().toISOString().split('T')[0],
        });
        showToast('已儲存');
        navigate('/cancer/' + card.id);
      });
    }

    async function renderChecklist(app) {
      const card = await dbGet('cancerCards', routeParams.cancerId);
      if (!card) { navigate('/'); return; }
      const items = (await dbGetAll('checklists')).filter(c => c.cancerId === card.id);
      const templates = checklistTemplatesForCancer(card.id);
      const selFields = (await dbGetAll('precisionFields')).filter(p => p.cancerId === card.id && (p.type === 'single_select' || p.type === 'multi_select'));

      app.innerHTML = `
        <div class="container">
          <button class="back-btn" onclick="navigate('/cancer/${card.id}')">← 返回</button>
          <h1 class="text-2xl font-bold mb-1">不要漏 Checklist</h1>
          <p class="text-sm text-gray-500 mb-6">${esc(card.zhName)}</p>

          <div class="flex gap-2 mb-4">
            <button class="btn btn-primary flex-1" id="add-checklist-btn">+ 新增項目</button>
            <button class="btn btn-secondary flex-1" id="add-preset-checklist-btn">📋 加入本癌別範本</button>
          </div>
          <p class="text-xs text-gray-400 mb-4">已預載共同防漏項目與本癌別專屬檢查；此按鈕可補回你主動刪除的範本，不會改動既有內容。</p>
          <div id="checklist-form" class="hidden card mb-4"></div>
          <div id="checklist-list"></div>
          ${renderNav('')}
        </div>
      `;

      const renderForm = (item) => {
        document.getElementById('checklist-form').classList.remove('hidden');
        document.getElementById('checklist-form').innerHTML = `
          <h2 class="font-semibold text-gray-800 mb-3">${item ? '編輯項目' : '新增項目'}</h2>
          <div class="space-y-3">
            ${item ? '' : `<div class="form-group"><label class="label">常用範本（選擇後自動填入，可再修改）</label>
              <select class="input" id="cl-preset">
                <option value="">— 自行輸入 —</option>
                ${templates.map((p, i) => `<option value="${i}">${p.scope === 'cancer' ? '本癌別｜' : '共同｜'}${esc(p.label)}</option>`).join('')}
              </select>
            </div>`}
            <div class="form-group"><label class="label">項目名稱</label><input class="input" id="cl-label" value="${esc(item?.label || '')}" placeholder="確認生物標記狀態"></div>
            <div class="form-group"><label class="label">分類</label>
              <select class="input" id="cl-cat">
                ${['檢測','評估','處置','確認','其他'].map(c => `<option value="${c}" ${item?.category===c?'selected':''}>${c}</option>`).join('')}
              </select>
            </div>
            <div class="form-group"><label class="label">重要性</label>
              <select class="input" id="cl-imp">
                ${['必查','建議','參考'].map(i => `<option value="${i}" ${item?.importance===i?'selected':''}>${i}</option>`).join('')}
              </select>
            </div>
            ${condPickerHTML(selFields, item?.condition)}
            <div class="flex gap-2">
              <button class="btn btn-primary flex-1" id="cl-save">儲存</button>
              <button class="btn btn-secondary flex-1" id="cl-cancel">取消</button>
            </div>
          </div>
        `;
        wireCondPicker(selFields, item?.condition);
        document.getElementById('cl-preset')?.addEventListener('change', (e) => {
          const p = templates[Number(e.target.value)];
          if (!p) return;
          document.getElementById('cl-label').value = p.label;
          document.getElementById('cl-cat').value = p.category;
          document.getElementById('cl-imp').value = p.importance;
        });
        document.getElementById('cl-save').addEventListener('click', async () => {
          const label = document.getElementById('cl-label').value.trim();
          if (!label) { showToast('請填寫項目名稱'); return; }
          const data = {
            id: item?.id || crypto.randomUUID(),
            cancerId: card.id,
            label,
            category: document.getElementById('cl-cat').value,
            importance: document.getElementById('cl-imp').value,
            condition: readCond(),
            checked: item?.checked || false,
            sourceType: '個人備註',
            sourceDocumentId: '',
            updatedAt: new Date().toISOString().split('T')[0],
          };
          await dbPut('checklists', data);
          showToast(item ? '已更新' : '已新增');
          navigate('/cancer/' + card.id + '/checklist');
        });
        document.getElementById('cl-cancel').addEventListener('click', () => {
          document.getElementById('checklist-form').classList.add('hidden');
        });
      };

      document.getElementById('add-checklist-btn').addEventListener('click', () => renderForm(null));

      // 一鍵加入所有常用項目（已存在同名者跳過）
      document.getElementById('add-preset-checklist-btn').addEventListener('click', async () => {
        const existing = new Set(items.map(i => String(i.label || '').trim().toLocaleLowerCase()));
        const today = new Date().toISOString().split('T')[0];
        let added = 0;
        for (const p of templates) {
          if ([p.label, ...(p.aliases || [])].some(label => existing.has(String(label).trim().toLocaleLowerCase()))) continue;
          await dbPut('checklists', {
            id: crypto.randomUUID(), cancerId: card.id,
            label: p.label, category: p.category, importance: p.importance,
            condition: null, checked: false, sourceType: '內建癌別範本',
            sourceDocumentId: '', sourceTemplateKey: p.key, templateScope: p.scope, updatedAt: today,
          });
          added++;
        }
        showToast(added ? `已加入 ${added} 項本癌別範本` : '本癌別範本皆已存在');
        navigate('/cancer/' + card.id + '/checklist');
      });

      const listEl = document.getElementById('checklist-list');
      if (items.length === 0) {
        listEl.innerHTML = '<div class="card text-center" style="padding:32px"><p class="text-gray-400">尚未新增任何項目</p></div>';
      } else {
        listEl.innerHTML = items.map(item => {
          const impClass = item.importance === '必查' ? 'tag-required' : '';
          return `
            <div class="card flex-between items-start gap-3">
              <div class="min-w-0 flex-1">
                <p class="font-medium text-gray-900">${esc(item.label)}</p>
                <div class="flex gap-2 mt-1" style="flex-wrap:wrap">
                  <span class="tag">${esc(item.category)}</span>
                  <span class="tag ${impClass}">${esc(item.importance)}</span>
                  ${item.sourceType === '內建癌別範本' ? '<span class="tag tag-category">內建範本</span>' : ''}
                  ${item.condition ? `<span class="tag tag-category">僅當 ${esc(condLabel(item.condition))}</span>` : ''}
                </div>
              </div>
              <div class="flex gap-1">
                <button class="btn btn-ghost btn-sm" onclick="window._editChecklist('${item.id}')">編輯</button>
                <button class="btn btn-ghost btn-sm text-red-500" onclick="window._deleteChecklist('${item.id}')">刪除</button>
              </div>
            </div>
          `;
        }).join('');
      }

      window._editChecklist = async (id) => {
        const item = await dbGet('checklists', id);
        if (item) renderForm(item);
      };

    function normalizeGuidelineSource(source) {
      return (source || '').normalize('NFKC').toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function normalizeGuidelineSeries(title) {
      return (title || '').normalize('NFKC')
        .replace(/\.pdf$/i, ' ')
        .replace(/\b20\d{2}\s*[._ -]*(?:v(?:ersion)?\s*)?\d+(?:\.\d+)*\b/gi, ' ')
        .replace(/\b(?:version|ver|v)?\s*\d+(?:\.\d+)*\s*[._ -]+20\d{2}\b/gi, ' ')
        .replace(/\b(?:version|ver|v)\s*\d+(?:\.\d+)*\b/gi, ' ')
        .replace(/\b20\d{2}\b/g, ' ')
        .replace(/[_\-.+()[\]{}]+/g, ' ')
        .toLowerCase()
        .replace(/\s+/g, ' ')
        .trim();
    }

    function isSameGuidelineSeries(existingDoc, newDoc) {
      const existingSource = normalizeGuidelineSource(existingDoc.source);
      const newSource = normalizeGuidelineSource(newDoc.source);
      if (!existingSource || existingSource !== newSource) return false;
      const existingSeries = normalizeGuidelineSeries(existingDoc.title || existingDoc.fileName);
      const newSeries = normalizeGuidelineSeries(newDoc.title || newDoc.fileName);
      return !!existingSeries && existingSeries === newSeries;
    }

    async function archiveSupersededDocs(newDoc) {
      const all = await dbGetAll('documents');
      for (const r of all) {
        if (r.id === newDoc.id || !r.current) continue;
        const existingCancerIds = r.cancerIds || [];
        const newCancerIds = newDoc.cancerIds || [];
        const sharesCancer = existingCancerIds.some(cid => newCancerIds.includes(cid));
        const fullyCovered = existingCancerIds.every(cid => newCancerIds.includes(cid));
        if (sharesCancer && fullyCovered && isSameGuidelineSeries(r, newDoc)) {
          await dbPut('documents', { ...r, current: false, archived: true });
        }
      }
    }

              <p class="text-xs text-blue-600">健保第 9 節 PDF、整份給付規定、NCCN 官方入口都集中在這裡</p>
            </div>
          </div>

          <div class="filter-bar">
            <button class="filter-chip active" data-source="">全部</button>
            ${sources.map(s => `<button class="filter-chip" data-source="${esc(s)}">${esc(s)}</button>`).join('')}
          </div>

          <label class="checkbox-wrap mb-4">
            <input type="checkbox" id="show-archived"> <span class="text-sm text-gray-600">顯示封存版本</span>
          </label>

          <div id="pdf-list"></div>
          ${renderNav('pdf')}
        </div>
      `;

      const renderList = () => {
        const filterSource = document.querySelector('.filter-chip.active')?.dataset.source || '';
        const showArchived = document.getElementById('show-archived')?.checked;

        let filtered = docs;
        if (filterSource) filtered = filtered.filter(d => d.source === filterSource);
        if (!showArchived) filtered = filtered.filter(d => !d.archived);
        filtered.sort((a, b) => { if (a.current && !b.current) return -1; if (!a.current && b.current) return 1; return (b.importedAt||'').localeCompare(a.importedAt||''); });

        const listEl = document.getElementById('pdf-list');
        if (filtered.length === 0) {
          listEl.innerHTML = '<div class="empty-state"><p class="mb-4">尚無 PDF 文件</p><button class="btn btn-primary" onclick="navigate(\'/pdf-library/import\')">匯入第一份 PDF</button></div>';
          return;
        }

        listEl.innerHTML = filtered.map(doc => {
          const tags = doc.cancerIds.map(cid => `<span class="tag tag-category">${esc(nameMap[cid] || cid)}</span>`).join(' ');
          return `
            <div class="card">
              <div class="flex-between gap-2 mb-2">
                <div class="min-w-0 flex-1">
                  <div class="flex items-center gap-2">
                    <p class="font-medium text-gray-900 truncate">${esc(doc.title)}</p>
                    ${doc.current ? '<span class="status status-maintained">目前版本</span>' : ''}
                    ${doc.archived ? '<span class="status status-pending">已封存</span>' : ''}
                  </div>
                  <p class="text-xs text-gray-500 mt-1">${esc(doc.source)} · ${esc(doc.version)}${doc.verifiedAt ? ` · 已確認 ${esc(doc.verifiedAt)}` : ''}</p>
                  ${isStaleDoc(doc) ? `<p class="text-xs mt-1" style="color:var(--amber-700)">⏰ 超過 6 個月未確認版本 <button class="text-xs" style="color:var(--primary-600);font-weight:500;border:none;background:none;cursor:pointer" onclick="window._verifyDoc('${doc.id}')">確認為最新</button></p>` : ''}
                </div>
              </div>
              ${tags ? `<div class="flex gap-1 mb-3">${tags}</div>` : ''}
              <div class="flex gap-2">
                ${doc.storageKey ? `<button class="btn btn-ghost btn-sm flex-1" onclick="openPdf('${doc.storageKey}')">開啟</button>` :
                  '<span class="btn btn-ghost btn-sm flex-1 text-gray-400" style="cursor:default">需重新匯入</span>'}
                <button class="btn btn-ghost btn-sm" onclick="navigate('/pdf-library/import/${doc.id}')">編輯</button>
                ${!doc.current && !doc.archived ? `<button class="btn btn-ghost btn-sm text-green-600" onclick="window._setCurrent('${doc.id}')">設為目前</button>` : ''}
                ${!doc.archived ? `<button class="btn btn-ghost btn-sm text-gray-500" onclick="window._archiveDoc('${doc.id}')">封存</button>` : ''}
                <button class="btn btn-ghost btn-sm text-red-500" onclick="window._deleteDoc('${doc.id}')">刪除</button>
              </div>
            </div>
          `;
        }).join('');
      };

      // Filter chips
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          renderList();
        });
      });
      document.getElementById('show-archived').addEventListener('change', renderList);
      renderList();

      window._setCurrent = async (id) => {
        const doc = await dbGet('documents', id);
        if (!doc) return;
        await archiveSupersededDocs(doc);
        await dbPut('documents', { ...doc, current: true, archived: false });
        showToast('已設為目前版本');
        navigate('/pdf-library');
      };
      window._archiveDoc = async (id) => {
        const doc = await dbGet('documents', id);
        if (doc) { await dbPut('documents', { ...doc, archived: true, current: false }); showToast('已封存'); navigate('/pdf-library'); }
      };
      window._deleteDoc = async (id) => {
        const doc = await dbGet('documents', id);
        if (!doc || !confirm(`確定刪除「${doc.title} (${doc.version})」？`)) return;
        if (doc.storageKey) await deletePdf(doc.storageKey);
        await dbDelete('documents', id);
        showToast('已刪除');
        navigate('/pdf-library');
      };
    }

    async function renderBatchImport(app) {
      const cancerCards = await dbGetAll('cancerCards');
      const cancerOptions = (selectedId) => cancerCards.map(c =>
        `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${esc(c.zhName)}（${esc(c.enName)}）</option>`
      ).join('');

      app.innerHTML = `
        <div class="container">
          <button class="back-btn" onclick="navigate('/pdf-library')">← 返回</button>
          <h1 class="text-2xl font-bold mb-1">批次匯入 PDF</h1>
          <p class="text-sm text-gray-500 mb-4">一次選多個 PDF，依檔名自動判斷癌別、來源與版本；匯入前可逐筆調整。</p>
          <div class="form-group">
            <input type="file" id="batch-files" accept=".pdf,application/pdf" multiple class="input" style="padding:8px">
          </div>
          <label class="checkbox-wrap mb-4"><input type="checkbox" id="batch-current" checked> <span class="text-sm text-gray-700">全部設為目前版本</span></label>
          <div id="batch-list"></div>
          ${sourceDatalist()}
          <button class="btn btn-primary hidden mb-4" id="batch-submit"></button>
          ${renderNav('pdf')}
        </div>
      `;

      let pending = [];
      const listEl = document.getElementById('batch-list');
      const submitBtn = document.getElementById('batch-submit');

      const renderRows = () => {
        submitBtn.classList.toggle('hidden', pending.length === 0);
        submitBtn.textContent = '匯入全部（' + pending.length + ' 份）';
        listEl.innerHTML = pending.map((p, i) => `
          <div class="card" data-row="${i}">
            <p class="text-xs text-gray-400 truncate mb-2">📄 ${esc(p.file.name)}</p>
            <div class="form-group"><label class="label">指引名稱</label><input class="input b-title" value="${esc(p.title)}"></div>
            <div class="form-group"><label class="label">癌別</label>
              <select class="input b-cancer">
                <option value="">（不指定，之後再編輯）</option>
                ${cancerOptions(p.cancerId)}
              </select>
              ${p.cancerId ? '' : '<p class="text-xs mt-1" style="color:var(--amber-700)">⚠️ 無法從檔名判斷，請手動選擇</p>'}
            </div>
            <div class="form-row">
              <div class="form-group"><label class="label">來源</label><input class="input b-source" list="source-presets" value="${esc(p.source)}"></div>
              <div class="form-group"><label class="label">版本</label><input class="input b-version" value="${esc(p.version)}"></div>
            </div>
            <button class="btn btn-ghost btn-sm text-red-500 b-remove">移除此筆</button>
          </div>
        `).join('');
        listEl.querySelectorAll('.b-remove').forEach(btn => btn.addEventListener('click', () => {
          const idx = Number(btn.closest('[data-row]').dataset.row);
          syncRows();
          pending.splice(idx, 1);
          renderRows();
        }));
      };

      const syncRows = () => {
        listEl.querySelectorAll('[data-row]').forEach(row => {
          const p = pending[Number(row.dataset.row)];
          if (!p) return;
          p.title = row.querySelector('.b-title').value.trim();
          p.cancerId = row.querySelector('.b-cancer').value;
          p.source = row.querySelector('.b-source').value.trim();
          p.version = row.querySelector('.b-version').value.trim();
        });
      };

      document.getElementById('batch-files').addEventListener('change', (e) => {
        pending = [...e.target.files].filter(f => f.type === 'application/pdf' || /\.pdf$/i.test(f.name)).map(f => {
          const base = f.name.replace(/\.pdf$/i, '');
          return {
            file: f,
            title: base.replace(/[_]+/g, ' ').trim(),
            cancerId: guessCancer(f.name, cancerCards)?.id || '',
            source: guessSource(f.name),
            version: guessVersion(base),
          };
        });
        renderRows();
      });

      submitBtn.addEventListener('click', async () => {
        syncRows();
        const missingTitle = pending.findIndex(p => !p.title);
        if (missingTitle >= 0) { showToast('第 ' + (missingTitle + 1) + ' 筆缺指引名稱'); return; }
        const setAsCurrent = document.getElementById('batch-current').checked;
        submitBtn.disabled = true;
        const today = new Date().toISOString().split('T')[0];
        let done = 0;
        try {
          for (const p of pending) {
            submitBtn.textContent = '匯入中（' + (done + 1) + '/' + pending.length + '）…';
            const storageKey = await storePdf(p.file);
            const docData = {
              id: crypto.randomUUID(),
              title: p.title,
              source: p.source,
              version: p.version,
              cancerIds: p.cancerId ? [p.cancerId] : [],
              fileName: p.file.name,
              storageKey,
              pageCount: 0,
              importedAt: today,
              current: setAsCurrent,
              archived: false,
              notes: '',
            };
            await dbPut('documents', docData);
            if (p.cancerId) {
              const card = await dbGet('cancerCards', p.cancerId);
              if (card && !card.documentIds.includes(docData.id)) {
                await dbPut('cancerCards', { ...card, documentIds: [...card.documentIds, docData.id], updatedAt: today });
              }
              if (setAsCurrent) await archiveSupersededDocs(docData);
            }
            done++;
          }
          showToast('已匯入 ' + done + ' 份 PDF');
          navigate('/pdf-library');
        } catch (e) {
          submitBtn.disabled = false;
          renderRows();
          showToast('第 ' + (done + 1) + ' 筆匯入失敗：' + e.message + '（前 ' + done + ' 筆已完成）');
        }
      });
    }

    async function init() {
      await openDB();
      await seedDatabase();
      // 要求持久儲存，避免瀏覽器在空間不足時清除 IndexedDB（含 PDF）
      if (navigator.storage?.persist) navigator.storage.persist();
      handleRoute();
    }

    // Expose navigate globally
    window.navigate = navigate;

    // Handle back/forward and manual hash edits
    window.addEventListener('hashchange', handleRoute);

    // Expose PDF function（page 有值時直接跳頁）
    window.openPdf = async (key, page) => {
      // 先在使用者手勢內同步開窗，await 之後才 window.open 會被 iOS 擋下
      const win = window.open('', '_blank');
      try {
        const blob = await getPdfBlob(key);
        if (!blob) throw new Error('找不到 PDF 檔案');
        const url = URL.createObjectURL(blob) + (page ? '#page=' + page : '');
        if (win) { win.location = url; } else { window.location.href = url; }
        setTimeout(() => URL.revokeObjectURL(url.split('#')[0]), 60000);
      } catch (e) {
        if (win) win.close();
        showToast(e.message);
      }
    };

    // ========== 全域小操作（勾選、精準欄位、版本確認） ==========
    // checklist 勾選：就地更新樣式，不重新渲染整頁
    window._toggleCheck = async (id, checked, el) => {
      const item = await dbGet('checklists', id);
      if (!item) return;
      await dbPut('checklists', { ...item, checked });
      const p = el?.closest('label')?.querySelector('p');
      if (p) { p.style.textDecoration = checked ? 'line-through' : ''; p.style.color = checked ? 'var(--gray-400)' : ''; }
    };
    window._resetChecks = async (cancerId) => {
      const items = (await dbGetAll('checklists')).filter(c => c.cancerId === cancerId && c.checked);
      for (const it of items) await dbPut('checklists', { ...it, checked: false });
      showToast('已重設勾選');
      handleRoute();
    };
    // 精準欄位填值（單選／文字／數字）；改值後重繪，讓條件連動即時反映
    window._setPfValue = async (id, value) => {
      const f = await dbGet('precisionFields', id);
      if (f) { await dbPut('precisionFields', { ...f, value }); handleRoute(); }
    };
    // 精準欄位多選：以選項 index 切換，避免特殊字元進到 onclick
    window._togglePfMulti = async (id, optIdx) => {
      const f = await dbGet('precisionFields', id);
      if (!f) return;
      const opt = f.options[optIdx];
      const cur = Array.isArray(f.value) ? [...f.value] : [];
      const i = cur.indexOf(opt);
      if (i >= 0) cur.splice(i, 1); else cur.push(opt);
      await dbPut('precisionFields', { ...f, value: cur });
      handleRoute();
    };
    // 指引版本確認為最新
    window._verifyDoc = async (id) => {
      const d = await dbGet('documents', id);
      if (!d) return;
      await dbPut('documents', { ...d, verifiedAt: new Date().toISOString().split('T')[0] });
      showToast('已確認為最新版本');
      handleRoute();
    };

    init();

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(
          (reg) => console.log('SW registered:', reg?.scope || 'disabled'),
          (err) => console.log('SW registration failed:', err)
        );
      });
    }
  </script>
</body>
</html>
